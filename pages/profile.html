<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Talent & Agency</title>
    <script src="/auth-utils.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000000;
            color: #ffffff;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .profile-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            height: fit-content;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .profile-avatar-container {
            position: relative;
            display: inline-block;
        }

        .avatar-upload-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 30px;
            height: 30px;
            background: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            border: 2px solid #000;
            transition: all 0.3s ease;
        }

        .avatar-upload-btn:hover {
            background: #2563eb;
            transform: scale(1.1);
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .profile-role {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 1.5rem;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1.5rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            display: block;
        }

        .stat-label {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .content-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-button {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-button.active {
            color: white;
            border-bottom-color: #3b82f6;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.08);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-upload-label {
            display: block;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-upload-label:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .post-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .post-type {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .post-content {
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .post-media img, .post-media video {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .post-actions {
            display: flex;
            gap: 1rem;
        }

        .post-action {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 0.875rem;
        }

        .post-action:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .status-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .checkbox-group, .radio-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .checkbox-label, .radio-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .profile-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Profile</h1>
        </header>

        <div class="profile-layout">
            <!-- Profile Card -->
            <aside class="profile-card">
                <div class="profile-avatar-container">
                    <div class="profile-avatar" id="profile-avatar">👤</div>
                    <div class="avatar-upload-btn" onclick="document.getElementById('avatar-upload').click()">
                        <span>📷</span>
                    </div>
                    <input type="file" id="avatar-upload" accept="image/*" style="display: none;" onchange="handleAvatarUpload(event)">
                </div>
                <h2 class="profile-name" id="profile-name">Loading... <span id="verified-badge" style="display:none;color:#3b82f6;font-size:1rem;" title="Verified">✓</span></h2>
                <p class="profile-role" id="profile-role">Talent</p>

                <div style="margin: 0.75rem 0; display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    <button onclick="shareMyProfile()" style="padding:0.4rem 0.85rem;border-radius:8px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);font-size:0.8rem;cursor:pointer;" title="Share my profile">
                        🔗 Share Profile
                    </button>
                    <span id="age-verified-badge" style="display:none;padding:0.4rem 0.85rem;border-radius:8px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#4ade80;font-size:0.75rem;">✓ Âge vérifié</span>
                </div>

                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="posts-count">0</div>
                        <div class="stat-label">Posts</div>
                    </div>
                </div>

                <!-- Agency Management Links -->
                <div id="agency-management" style="display: none; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                    <h3 style="font-size: 1rem; font-weight: 600; margin-bottom: 1.5rem; color: rgba(255, 255, 255, 0.7);">Agency Management</h3>
                    <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                        <a href="/manage-subscription" class="btn btn-primary" style="text-align: center; font-size: 0.875rem; padding: 0.875rem 1rem; border-radius: 8px; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; text-decoration: none; transition: all 0.3s ease; display: block;">
                            Manage Subscription
                        </a>
                        <a href="/discover" class="btn btn-primary" style="text-align: center; font-size: 0.875rem; padding: 0.875rem 1rem; border-radius: 8px; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; text-decoration: none; transition: all 0.3s ease; display: block;">
                            Discover Talents
                        </a>
                    </div>
                </div>

                <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                    <button class="btn btn-primary" style="width: 100%; padding: 0.875rem 1rem; border-radius: 8px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; font-size: 0.875rem; transition: all 0.3s ease;" onclick="saveProfile()">Save Profile</button>
                </div>
            </aside>

            <!-- Profile Content -->
            <main class="profile-content">
                <div id="status-message" class="status-message"></div>

                <!-- Content Tabs -->
                <div class="content-tabs">
                    <button class="tab-button active" onclick="switchTab('edit')">Edit Profile</button>
                    <button class="tab-button" onclick="switchTab('media')">Publish New Post</button>
                    <button class="tab-button" onclick="switchTab('posts')">Posts</button>
                </div>

                <!-- Edit Profile Tab -->
                <div id="edit-tab" class="tab-content active">
                    <h3 style="margin-bottom: 1.5rem;">Edit Profile Information</h3>
                    
                    <!-- Basic Info -->
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-input" id="first-name" placeholder="First name">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-input" id="last-name" placeholder="Last name">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="email" placeholder="your.email@example.com" readonly style="opacity:0.6;">
                    </div>

                    <!-- Talent-specific fields -->
                    <div id="talent-fields" style="display:none;">
                        <h4 style="margin: 2rem 0 1rem; color: rgba(255,255,255,0.7);">Talent Information</h4>

                        <div class="form-group">
                            <label class="form-label">Stage Name / Display Name</label>
                            <input type="text" class="form-input" id="display-name" placeholder="Your stage name">
                        </div>

                        
                        <div class="form-group">
                            <label class="form-label">Portfolio/Website URL (optional)</label>
                            <input type="url" class="form-input" id="portfolio" placeholder="https://yourportfolio.com">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Age</label>
                            <input type="number" class="form-input" id="age" placeholder="25" min="18" max="100">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Country</label>
                            <select class="form-select" id="country">
                                <option value="">Select your country</option>
                                <option value="US">United States</option>
                                <option value="UK">United Kingdom</option>
                                <option value="CA">Canada</option>
                                <option value="AU">Australia</option>
                                <option value="FR">France</option>
                                <option value="DE">Germany</option>
                                <option value="IT">Italy</option>
                                <option value="ES">Spain</option>
                                <option value="NL">Netherlands</option>
                                <option value="BR">Brazil</option>
                                <option value="MX">Mexico</option>
                                <option value="JP">Japan</option>
                                <option value="KR">South Korea</option>
                                <option value="IN">India</option>
                                <option value="OTHER">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Languages you speak</label>
                            <textarea class="form-textarea" id="languages" placeholder="List the languages you speak (e.g., English, French, Spanish, Italian...)"></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Platforms</label>
                            <div class="checkbox-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="platforms" value="onlyfans">
                                    OnlyFans
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="platforms" value="fansly">
                                    Fansly
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="platforms" value="admireme">
                                    AdmireMe
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="platforms" value="other">
                                    Other
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Social Media Networks</label>
                            <input type="text" class="form-input" id="instagram" placeholder="Instagram username">
                            <input type="text" class="form-input" id="twitter" placeholder="Twitter username" style="margin-top: 0.5rem;">
                            <input type="text" class="form-input" id="tiktok" placeholder="TikTok username" style="margin-top: 0.5rem;">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Monthly Revenue ($)</label>
                            <select class="form-select" id="monthly-revenue">
                                <option value="">Select revenue range</option>
                                <option value="less-10k">Less than $10,000</option>
                                <option value="10k-25k">$10,000 - $25,000</option>
                                <option value="25k-50k">$25,000 - $50,000</option>
                                <option value="50k-100k">$50,000 - $100,000</option>
                                <option value="100k-250k">$100,000 - $250,000</option>
                                <option value="250k-500k">$250,000 - $500,000</option>
                                <option value="500k+">More than $500,000</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Do you currently have a manager?</label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="has-manager" value="yes">
                                    Yes
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="has-manager" value="no">
                                    No
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Bio / Description</label>
                            <textarea class="form-textarea" id="bio" placeholder="Tell us about yourself..."></textarea>
                        </div>
                    </div>

                    <!-- Agency-specific fields -->
                    <div id="agency-fields" style="display:none;">
                        <h4 style="margin: 2rem 0 1rem; color: rgba(255,255,255,0.7);">Agency Information</h4>

                        <div class="form-group">
                            <label class="form-label">Agency Name</label>
                            <input type="text" class="form-input" id="agency-name" placeholder="Your agency name">
                        </div>

                        
                        <div class="form-group">
                            <label class="form-label">Platforms you manage</label>
                            <div class="checkbox-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="agency-platforms" value="OnlyFans"> OnlyFans
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="agency-platforms" value="Fanvue"> Fanvue
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="agency-platforms" value="MYM"> MYM
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="agency-platforms" value="Fansly"> Fansly
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Number of Talents</label>
                            <input type="number" class="form-input" id="talent-count" placeholder="e.g., 25" min="0">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Monthly Revenue ($)</label>
                            <input type="number" class="form-input" id="agency-monthly-revenue" placeholder="e.g., 50000" min="0">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Total Revenue ($)</label>
                            <input type="number" class="form-input" id="total-revenue" placeholder="e.g., 500000" min="0">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Country</label>
                            <input type="text" class="form-input" id="agency-country" placeholder="e.g., France">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea class="form-textarea" id="agency-description" placeholder="Describe your agency..."></textarea>
                        </div>
                    </div>

                    <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
                </div>

                <!-- Publish New Post Tab -->
                <div id="media-tab" class="tab-content">
                    <h3 style="margin-bottom: 1.5rem;">Publish New Post</h3>
                    
                    <div class="form-group">
                        <label class="form-label">Post Content</label>
                        <textarea class="form-textarea" id="new-post-content" placeholder="What's on your mind? Share your thoughts..." rows="4"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Add Photo or Video (Optional)</label>
                        <div class="file-upload">
                            <input type="file" id="new-post-media" accept="image/*,video/*" onchange="handleNewPostMedia(event)">
                            <label for="new-post-media" class="file-upload-label">
                                <span>📷 Add Photo or Video</span>
                            </label>
                        </div>
                        <div id="new-post-media-preview" style="margin-top: 1rem; display: none;"></div>
                    </div>
                    
                    <button class="btn btn-primary" onclick="publishNewPost()">Publish Post</button>
                </div>

                <!-- Posts Tab -->
                <div id="posts-tab" class="tab-content">
                    <h3 style="margin-bottom: 1.5rem;">My Posts</h3>
                    <div id="posts-list">
                        <div style="text-align: center; padding: 2rem; color: rgba(255,255,255,0.5);">
                            <div style="font-size: 3rem; margin-bottom: 1rem;">📝</div>
                            <p>No posts yet. Create your first post in the "Publish New Post" tab!</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(String(str ?? '')));
            return div.innerHTML;
        }

        let profileData = {};
        let userRole = 'talent';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadProfile();
            loadPosts();
        });

        async function shareMyProfile() {
            try {
                const userData = Auth.getUser();
                if (!userData) return;
                const userId = userData.id || userData.user_id;
                const url = `${window.location.origin}/profile/${userId}`;
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(url);
                } else {
                    const ta = document.createElement('textarea');
                    ta.value = url; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
                    document.body.appendChild(ta); ta.select();
                    document.execCommand('copy'); document.body.removeChild(ta);
                }
                showStatus('Lien copié !', 'success');
            } catch (e) {
                showStatus('Impossible de copier le lien', 'error');
            }
        }

        function showAgeVerifyModal() {
            const modal = document.createElement('div');
            modal.id = 'ageVerifyModal';
            modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;';
            modal.innerHTML = `
                <div style="background:#111;border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:2.5rem;max-width:400px;width:90%;text-align:center;">
                    <div style="font-size:3rem;margin-bottom:1rem;">🔞</div>
                    <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:0.75rem;">Vérification d'âge requise</h2>
                    <p style="color:rgba(255,255,255,0.5);font-size:0.9rem;margin-bottom:2rem;line-height:1.5;">
                        Cette plateforme est réservée aux personnes majeures (18+).<br>
                        En confirmant, vous attestez avoir au moins 18 ans.
                    </p>
                    <div style="display:flex;gap:1rem;justify-content:center;">
                        <button onclick="confirmAge()" style="padding:0.75rem 1.5rem;border-radius:8px;background:#3b82f6;border:none;color:#fff;font-size:0.9rem;font-weight:600;cursor:pointer;">
                            J'ai 18 ans ou plus
                        </button>
                        <button onclick="denyAge()" style="padding:0.75rem 1.5rem;border-radius:8px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);font-size:0.9rem;cursor:pointer;">
                            Non, quitter
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        async function confirmAge() {
            try {
                await Auth.apiFetch('/api/user/verify-age', { method: 'POST' });
                document.getElementById('ageVerifyModal')?.remove();
                document.getElementById('age-verified-badge').style.display = 'inline';
            } catch (e) {
                document.getElementById('ageVerifyModal')?.remove();
            }
        }

        function denyAge() {
            Auth.logout();
        }

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');
        }

        // Status messages
        function showStatus(message, type) {
            const statusEl = document.getElementById('status-message');
            statusEl.textContent = message;

        // Save profile
        async function saveProfile() {
            profileData.first_name = document.getElementById('first-name').value;
            profileData.last_name = document.getElementById('last-name').value;
            profileData.email = document.getElementById('email').value;

            let apiPayload = {
                firstName: profileData.first_name,
                lastName: profileData.last_name,
                email: profileData.email,
            };

            if (userRole === 'talent') {
                profileData.portfolio = document.getElementById('portfolio').value;
                profileData.age = document.getElementById('age').value;
                profileData.country = document.getElementById('country').value;
                profileData.languages = document.getElementById('languages').value;
                profileData.instagram = document.getElementById('instagram').value;
                profileData.twitter = document.getElementById('twitter').value;
                profileData.tiktok = document.getElementById('tiktok').value;
                profileData.monthly_revenue = document.getElementById('monthly-revenue').value;
                profileData.has_manager = document.querySelector('input[name="has-manager"]:checked')?.value || 'no';
                profileData.bio = document.getElementById('bio').value;

                const checkedPlatforms = Array.from(document.querySelectorAll('input[name="platforms"]:checked')).map(cb => cb.value);
                profileData.platforms = checkedPlatforms.join(', ');

                apiPayload = {
                    ...apiPayload,
                    displayName: profileData.display_name || (profileData.first_name + ' ' + profileData.last_name),
                    bio: profileData.bio,
                    age: profileData.age,
                    country: profileData.country,
                    languages: profileData.languages,
                    hasManager: profileData.has_manager,
                    revenue: profileData.monthly_revenue,
                    platforms: checkedPlatforms,
                    socialMedia: { instagram: profileData.instagram, twitter: profileData.twitter, tiktok: profileData.tiktok },
                };
            } else if (userRole === 'agency') {
                profileData.agency_name = document.getElementById('agency-name').value;
                profileData.talent_count = document.getElementById('talent-count').value;
                profileData.agency_revenue = document.getElementById('agency-monthly-revenue').value;
                profileData.total_revenue = document.getElementById('total-revenue').value;
                profileData.agency_country = document.getElementById('agency-country').value;
                profileData.agency_description = document.getElementById('agency-description').value;

                apiPayload = {
                    ...apiPayload,
                    agencyName: profileData.agency_name,
                    talentCount: profileData.talent_count,
                    totalRevenue: profileData.total_revenue || profileData.agency_revenue,
                    description: profileData.agency_description,
                };
            }

            // Persist to localStorage
            localStorage.setItem('userProfile', JSON.stringify(profileData));

            // Persist to API
            try {
                const endpoint = userRole === 'talent' ? '/api/profile/talent' : '/api/profile/agency';
                const res = await Auth.apiFetch(endpoint, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(apiPayload),
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('profile-name').childNodes[0].textContent =
                        profileData.first_name + ' ' + profileData.last_name + ' ';
                    showStatus('Profile saved successfully!', 'success');
                } else {
                    showStatus('Error saving profile: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (e) {
                showStatus('Connection error — changes saved locally only.', 'error');
            }
        }

        // Handle new post media
        function handleNewPostMedia(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                const preview = document.getElementById('new-post-media-preview');
                
                reader.onload = function(e) {
                    let mediaHtml = '';
                    if (file.type.startsWith('image/')) {
                        mediaHtml = `<img src="${e.target.result}" alt="Preview" style="max-width: 100%; border-radius: 8px;">`;
                    } else if (file.type.startsWith('video/')) {
                        mediaHtml = `<video src="${e.target.result}" controls style="max-width: 100%; border-radius: 8px;"></video>`;
                    }
                    
                    preview.innerHTML = mediaHtml;
                    preview.style.display = 'block';
                };
                
                reader.readAsDataURL(file);
            }
        }

        // Publish new post
        async function publishNewPost() {
            const content = document.getElementById('new-post-content').value.trim();
            const mediaFile = document.getElementById('new-post-media').files[0];
            
            if (!content && !mediaFile) {
                showStatus('Please add content or media to your post', 'error');
                return;
            }

            try {
                const token = Auth.getToken();
                if (!token) {
                    showStatus('Please login to publish posts', 'error');
                    return;
                }

                // Show loading
                const publishBtn = document.querySelector('button[onclick="publishNewPost()"]');
                const originalText = publishBtn.innerHTML;
                publishBtn.innerHTML = '⏳ Publishing...';
                publishBtn.disabled = true;

                let media_url = null;
                let postType = 'text';

                // Handle media upload if exists
                if (mediaFile) {
                    const formData = new FormData();
                    formData.append('media', mediaFile);

                    const uploadResponse = await fetch('/api/upload/post-media', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });

                    const uploadResult = await uploadResponse.json();
                    if (uploadResponse.ok && uploadResult.success) {
                        media_url = uploadResult.media_url;
                        postType = mediaFile.type.startsWith('image/') ? 'photo' : 'video';
                    }
                }

                if (content && mediaFile) {
                    postType = 'mixed';
                }

                // Create post in database
                const response = await fetch('/api/posts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        content: content,
                        type: postType,
                        media_url: media_url
                    })
                });

                const result = await response.json();

                if (!response.ok || !result.success) {
                    throw new Error(result.error || 'Failed to publish post');
                }

                // Clear form
                document.getElementById('new-post-content').value = '';
                document.getElementById('new-post-media').value = '';
                document.getElementById('new-post-media-preview').style.display = 'none';

                // Refresh posts - reload from API to get latest data
                console.log('🔄 Refreshing posts after publication...');
                await loadProfile(); // Reload entire profile to get updated posts
                displayPosts(); // Display the updated posts
                
                showStatus('Post published successfully!', 'success');

            } catch (error) {
                console.error('Publish post error:', error);
                showStatus('Failed to publish post: ' + error.message, 'error');
            } finally {
                // Reset button
                const publishBtn = document.querySelector('button[onclick="publishNewPost()"]');
                publishBtn.innerHTML = 'Publish Post';
                publishBtn.disabled = false;
            }
        }

        // Load posts from database (or use already loaded posts from API)
        async function loadPostsFromDatabase() {
            try {
                // If posts are already loaded from API, use them
                if (profileData.posts && profileData.posts.length > 0) {
                    console.log('Using posts already loaded from API:', profileData.posts);
                    document.getElementById('posts-count').textContent = profileData.posts.length;
                    displayPosts();
                    return;
                }

                const token = Auth.getToken();
                if (!token) {
                    console.log('No token, using local posts');
                    loadPosts(); // Fallback to local storage
                    return;
                }

                // Get current user ID from profile data or auth
                const user = Auth.getUser();
                const userId = user?.id;

                if (!userId) {
                    console.log('No user ID, using local posts');
                    loadPosts(); // Fallback
                    return;
                }

                const response = await fetch(`/api/posts/user/${userId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load posts');
                }

                const result = await response.json();
                
                if (result.success && result.data) {
                    // Update profile data with database posts
                    profileData.posts = result.data.map(post => ({
                        id: post.id,
                        content: post.content,
                        type: post.type,
                        media: post.media_url ? {
                            type: post.type.includes('photo') ? 'image' : post.type.includes('video') ? 'video' : 'image',
                            url: post.media_url
                        } : null,
                        createdAt: post.created_at,
                        likes: post.likes,
                        comments: post.comments,
                        shares: post.shares
                    }));

                    // Update posts count
                    document.getElementById('posts-count').textContent = profileData.posts.length;
                    
                    // Display posts
                    displayPosts();
                }

            } catch (error) {
                console.error('Load posts error:', error);
                loadPosts(); // Fallback to local storage
            }
        }

                profileData.posts = profileData.posts.filter(post => post.id !== postId);
                localStorage.setItem('userProfile', JSON.stringify(profileData));
                document.getElementById('posts-count').textContent = profileData.posts.length;
                loadPosts();
                showStatus('Post deleted', 'success');
            }
        }

        // Handle avatar upload
        async function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            console.log('Avatar upload started:', file.name, file.type, file.size);

            // Validate file type
            if (!file.type.startsWith('image/')) {
                showStatus('Please select an image file', 'error');
                return;
            }

            // Validate file size (max 5MB)
            if (file.size > 5 * 1024 * 1024) {
                showStatus('Image size must be less than 5MB', 'error');
                return;
            }

            try {
                const token = Auth.getToken();
                if (!token) {
                    showStatus('Please login to upload avatar', 'error');
                    return;
                }

                console.log('Token found, starting upload...');

                // Show loading
                const avatarContainer = document.querySelector('.profile-avatar');
                const originalContent = avatarContainer.innerHTML;
                avatarContainer.innerHTML = '⏳';

                // Use XMLHttpRequest instead of fetch
                const result = await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    const formData = new FormData();
                    formData.append('avatar', file);

                    console.log('FormData created, sending request...');

                    xhr.open('POST', '/api/upload/avatar', true);
                    xhr.setRequestHeader('Authorization', `Bearer ${token}`);

                    xhr.onload = function() {
                        console.log('XHR response received:', xhr.status, xhr.statusText);
                        console.log('Response text:', xhr.responseText);
                        
                        if (xhr.status >= 200 && xhr.status < 300) {
                            try {
                                const response = JSON.parse(xhr.responseText);
                                resolve(response);
                            } catch (e) {
                                reject(new Error('Invalid JSON response'));
                            }
                        } else {
                            try {
                                const errorResponse = JSON.parse(xhr.responseText);
                                reject(new Error(errorResponse.error || `HTTP ${xhr.status}`));
                            } catch (e) {
                                reject(new Error(`HTTP ${xhr.status}: ${xhr.statusText}`));
                            }
                        }
                    };

                    xhr.onerror = function() {
                        console.error('XHR network error');
                        reject(new Error('Network error'));
                    };

                    xhr.send(formData);
                    console.log('XHR request sent');
                });

                if (!result.success) {
                    throw new Error(result.error || 'Upload failed');
                }

                // Update avatar display
                if (result.avatar_url) {
                    avatarContainer.innerHTML = `<img src="${result.avatar_url}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">`;
                    
                    // Update profile data
                    profileData.avatar_url = result.avatar_url;
                    localStorage.setItem('userProfile', JSON.stringify(profileData));
                    
                    showStatus('Avatar updated successfully!', 'success');
                }

            } catch (error) {
                console.error('Avatar upload error:', error);
                showStatus('Failed to upload avatar: ' + error.message, 'error');
                
                // Restore original avatar
                const avatarContainer = document.querySelector('.profile-avatar');
                if (typeof originalContent !== 'undefined') {
                    avatarContainer.innerHTML = originalContent;
                }
            }
        }
    </script>
