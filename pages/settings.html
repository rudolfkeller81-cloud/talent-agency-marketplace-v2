<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Talent Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../auth-utils.js"></script>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        
        .settings-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }
        
        .settings-card:hover {
            border-color: #333;
            transform: translateY(-2px);
        }
        
        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }
        
        .settings-btn.danger {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
        }
        
        .settings-btn.danger:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
        }
        
        .settings-btn.success {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
        }
        
        .settings-btn.success:hover {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.5);
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 2rem;
            transition: color 0.2s;
        }
        
        .back-btn:hover {
            color: #2563eb;
        }
        
        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .section-description {
            color: #a1a1aa;
            font-size: 1.125rem;
            margin-bottom: 2rem;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #111;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #999;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        
        .modal-close:hover {
            background: #222;
            color: #fff;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #fff;
        }
        
        .form-input {
            width: 100%;
            padding: 0.75rem;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: #2a2a2a;
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid;
        }
        
        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border-color: #22c55e;
            color: #22c55e;
        }
        
        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            color: #ef4444;
        }
        
        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
            color: #3b82f6;
        }
        
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .toggle {
            position: relative;
            display: inline-block;
            width: 64px;
            height: 34px;
            cursor: pointer;
        }
        
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            inset: 0;
            background-color: #444;
            border-radius: 34px;
            transition: background-color 0.3s ease;
        }
        
        .slider::before {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            left: 4px;
            top: 4px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
        
        .toggle input:checked + .slider {
            background-color: #4cd964;
        }
        
        .toggle input:checked + .slider::before {
            transform: translateX(30px);
        }
        
        .toggle-label {
            color: #ccc;
            font-size: 14px;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="bg-black text-white">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Back Button -->
        <a href="../discover.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            Back
        </a>
        
        <!-- Header -->
        <div class="mb-8">
            <h1 class="section-title">Settings</h1>
            <p class="section-description">Manage your preferences and account</p>
        </div>
        
        <!-- Profile Section -->
        <div class="settings-card">
            <h2 class="text-xl font-semibold mb-4">
                <i class="fas fa-user mr-2"></i>Profile
            </h2>
            <p class="text-gray-400 mb-6">Manage your personal information</p>
            
            <div class="space-y-3">
                <button class="settings-btn" onclick="changePassword()">
                    <span><i class="fas fa-lock mr-2"></i>Change Password</span>
                    <span class="arrow-icon">→</span>
                </button>
            </div>
        </div>
        
        <!-- Privacy Section -->
        <div class="settings-card">
            <h2 class="text-xl font-semibold mb-4">
                <i class="fas fa-shield-alt mr-2"></i>Privacy
            </h2>
            <p class="text-gray-400 mb-6">Control your personal information</p>
            
            <div class="space-y-3">
                <button class="settings-btn" onclick="openPrivacySettings()">
                    <span><i class="fas fa-user-shield mr-2"></i>Privacy Settings</span>
                    <span class="arrow-icon">→</span>
                </button>
                
                <button class="settings-btn" onclick="downloadData()">
                    <span><i class="fas fa-download mr-2"></i>Download My Data</span>
                    <span class="arrow-icon">→</span>
                </button>
                
                <button class="settings-btn" onclick="manageCookies()">
                    <span><i class="fas fa-cookie mr-2"></i>Cookie Management</span>
                    <span class="arrow-icon">→</span>
                </button>
            </div>
        </div>
        
        <!-- Management Section -->
        <div class="settings-card" id="managementSection">
            <h2 class="text-xl font-semibold mb-4">
                <i class="fas fa-tools mr-2"></i>Management
            </h2>
            <p class="text-gray-400 mb-6">Account management tools</p>
            
            <div class="space-y-3">
                <button class="settings-btn success" onclick="openSubscriptionManagement()">
                    <span><i class="fas fa-credit-card mr-2"></i>Subscription & Billing</span>
                    <span class="arrow-icon">→</span>
                </button>
                
                <button class="settings-btn" onclick="exportData()">
                    <span><i class="fas fa-file-export mr-2"></i>Export My Data</span>
                    <span class="arrow-icon">→</span>
                </button>
                
                <button class="settings-btn danger" onclick="deleteAccount()">
                    <span><i class="fas fa-trash mr-2"></i>Delete My Account</span>
                    <span class="arrow-icon">→</span>
                </button>
            </div>
        </div>
        
        <!-- Support Section -->
        <div class="settings-card">
            <h2 class="text-xl font-semibold mb-4">
                <i class="fas fa-life-ring mr-2"></i>Support
            </h2>
            <p class="text-gray-400 mb-6">Help and assistance</p>
            
            <div class="space-y-3">
                <button class="settings-btn" onclick="contactSupport()">
                    <span><i class="fas fa-envelope mr-2"></i>Contact Support</span>
                    <span class="arrow-icon">→</span>
                </button>
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle" class="modal-title">Titre</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modalBody">
                <!-- Content will be inserted here -->
            </div>
        </div>
    </div>
    
    <script>
        // Modal functions
        function openModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('settingsModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('settingsModal').classList.remove('active');
        }
        
        // Profile functions
        function changePassword() {
            // Redirect to forgot password page
            window.location.href = '../forgot-password.html';
        }
        
        // Privacy functions
        function openPrivacySettings() {
            const content = `
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <span>Public Profile</span>
                        <label class="toggle">
                            <input type="checkbox" id="publicProfile" onchange="updatePrivacySetting('publicProfile', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="flex items-center justify-between">
                        <span>Show Email</span>
                        <label class="toggle">
                            <input type="checkbox" id="showEmail" onchange="updatePrivacySetting('showEmail', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="flex items-center justify-between">
                        <span>Allow Search</span>
                        <label class="toggle">
                            <input type="checkbox" id="allowSearch" checked onchange="updatePrivacySetting('allowSearch', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="flex gap-3">
                        <button class="settings-btn success" onclick="closeModal()">
                            <span><i class="fas fa-save mr-2"></i>Done</span>
                        </button>
                    </div>
                </div>
            `;
            openModal('Privacy Settings', content);
            loadPrivacySettings();
        }
        
        function loadPrivacySettings() {
            const token = Auth.getToken();
            fetch('/api/user/privacy', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('publicProfile').checked = data.data.publicProfile || false;
                    document.getElementById('showEmail').checked = data.data.showEmail || false;
                    document.getElementById('allowSearch').checked = data.data.allowSearch !== false;
                }
            })
            .catch(error => console.error('Error loading privacy settings:', error));
        }
        
        async function updatePrivacySetting(setting, value) {
            try {
                const token = Auth.getToken();
                const response = await fetch('/api/user/privacy', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ [setting]: value })
                });
                
                if (response.ok) {
                    console.log(`${setting} updated to ${value}`);
                } else {
                    console.error('Failed to update privacy setting');
                }
            } catch (error) {
                console.error('Error updating privacy setting:', error);
            }
        }
        
        async function downloadData() {
            if (!confirm('Are you sure you want to download all your data?')) {
                return;
            }
            
            try {
                const token = Auth.getToken();
                const response = await fetch('/api/user/data', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const data = await response.blob();
                    const url = window.URL.createObjectURL(data);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'my-data.json';
                    a.click();
                    window.URL.revokeObjectURL(url);
                    showAlert('Données téléchargées avec succès!', 'success');
                } else {
                    throw new Error('Erreur lors du téléchargement');
                }
            } catch (error) {
                showAlert('Erreur: ' + error.message, 'error');
            }
        }
        
        function manageCookies() {
            const content = `
                <div class="space-y-4">
                    <p class="text-gray-300">
                        Manage your cookie and tracking preferences.
                    </p>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <span>Essential Cookies</span>
                            <label class="toggle">
                                <input type="checkbox" checked disabled>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="flex items-center justify-between">
                            <span>Analytics Cookies</span>
                            <label class="toggle">
                                <input type="checkbox" id="analyticsCookies" onchange="updateCookieSetting('analytics', this.checked)">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="flex items-center justify-between">
                            <span>Marketing Cookies</span>
                            <label class="toggle">
                                <input type="checkbox" id="marketingCookies" onchange="updateCookieSetting('marketing', this.checked)">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button class="settings-btn success" onclick="closeModal()">
                            <span><i class="fas fa-save mr-2"></i>Done</span>
                        </button>
                        <button class="settings-btn danger" onclick="clearAllCookies()">
                            <span><i class="fas fa-trash mr-2"></i>Clear All</span>
                        </button>
                    </div>
                </div>
            `;
            openModal('Cookie Management', content);
            loadCookieSettings();
        }
        
        function loadCookieSettings() {
            const cookieSettings = JSON.parse(localStorage.getItem('cookieSettings') || '{}');
            document.getElementById('analyticsCookies').checked = cookieSettings.analytics !== false;
            document.getElementById('marketingCookies').checked = cookieSettings.marketing !== false;
        }
        
        function updateCookieSetting(type, value) {
            const cookieSettings = JSON.parse(localStorage.getItem('cookieSettings') || '{}');
            cookieSettings[type] = value;
            localStorage.setItem('cookieSettings', JSON.stringify(cookieSettings));
            console.log(`${type} cookies ${value ? 'enabled' : 'disabled'}`);
        }
        
        function clearAllCookies() {
            if (confirm('Are you sure you want to clear all cookies?')) {
                document.cookie.split(";").forEach(function(c) { 
                    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
                });
                localStorage.clear();
                showAlert('All cookies have been cleared!', 'success');
                closeModal();
            }
        }
        
        // Management functions
        function openSubscriptionManagement() {
            // Redirect to subscription management page
            window.location.href = 'manage-subscription.html';
        }
        
        async function exportData() {
            if (!confirm('Êtes-vous sûr de vouloir exporter vos données ?')) {
                return;
            }
            
            try {
                const token = Auth.getToken();
                const response = await fetch('/api/user/export', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const data = await response.blob();
                    const url = window.URL.createObjectURL(data);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'user-export.zip';
                    a.click();
                    window.URL.revokeObjectURL(url);
                    showAlert('Données exportées avec succès!', 'success');
                } else {
                    throw new Error('Erreur lors de l\'export');
                }
            } catch (error) {
                showAlert('Erreur: ' + error.message, 'error');
            }
        }
        
        function deleteAccount() {
            const content = `
                <div class="space-y-4">
                    <div class="alert-error">
                        <i class="fas fa-exclamation-triangle mr-2"></i>
                        <strong>Warning!</strong> This action is irreversible.
                    </div>
                    <p class="text-gray-300">
                        Deleting your account will permanently lose:
                    </p>
                    <ul class="list-disc list-inside text-gray-300 space-y-1">
                        <li>Your profile and all personal information</li>
                        <li>Your messages and conversations</li>
                        <li>Your favorites and preferences</li>
                        <li>Your active subscription</li>
                    </ul>
                    <div class="form-group">
                        <label class="form-label">Confirm by typing "DELETE"</label>
                        <input type="text" class="form-input" id="confirmDelete" placeholder="DELETE">
                    </div>
                    <div class="flex gap-3">
                        <button class="settings-btn danger" onclick="confirmDeleteAccount()" id="deleteBtn" disabled>
                            <span><i class="fas fa-trash mr-2"></i>Delete Permanently</span>
                        </button>
                        <button class="settings-btn" onclick="closeModal()">
                            <span>Cancel</span>
                        </button>
                    </div>
                </div>
            `;
            openModal('Delete My Account', content);
            
            // Enable delete button only when correct text is entered
            document.getElementById('confirmDelete').addEventListener('input', function(e) {
                document.getElementById('deleteBtn').disabled = e.target.value !== 'DELETE';
            });
        }
        
        async function confirmDeleteAccount() {
            if (!confirm('FINAL CONFIRMATION: Are you absolutely sure you want to delete your account?')) {
                return;
            }
            
            const button = document.getElementById('deleteBtn');
            button.classList.add('loading');
            button.innerHTML = '<span class="spinner"></span> Deleting...';
            
            try {
                const token = Auth.getToken();
                const response = await fetch('/api/user/delete', {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    showAlert('Account deleted successfully', 'success');
                    // Clear local storage and redirect to home
                    localStorage.clear();
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 2000);
                } else {
                    throw new Error('Error during deletion');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            } finally {
                button.classList.remove('loading');
                button.innerHTML = '<span><i class="fas fa-trash mr-2"></i>Delete Permanently</span>';
            }
        }
        
        // Support functions
        function contactSupport() {
            // Redirect to contact page
            window.location.href = '../contact.html';
        }
        
        // Utility functions
        function showAlert(message, type = 'info') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'} mr-2"></i>
                ${message}
            `;
            
            // Insert at the top of the modal body
            const modalBody = document.getElementById('modalBody');
            modalBody.insertBefore(alertDiv, modalBody.firstChild);
            
            // Remove after 5 seconds
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Settings page loaded - Full functionality');
            
            // Check user role and show/hide management section
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            const userRole = userData.role || 'talent';
            
            if (userRole !== 'agency') {
                document.getElementById('managementSection').style.display = 'none';
                console.log('🏢 Management section hidden - user type:', userRole);
            }
            
            // Load saved settings
            loadSavedSettings();
        });
        
        function loadSavedSettings() {
            // Load notification settings
            const notificationSettings = JSON.parse(localStorage.getItem('notificationSettings') || '{}');
            // Apply settings to UI if needed
            
            // Load theme settings
            const themeSettings = JSON.parse(localStorage.getItem('themeSettings') || '{}');
            if (themeSettings.theme) {
                document.body.classList.toggle('light-theme', themeSettings.theme === 'light');
            }
        }
        
        // Close modal when clicking outside
        document.getElementById('settingsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
