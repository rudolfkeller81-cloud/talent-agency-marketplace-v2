<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Talent & Agency</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            flex: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
        }

        .messages-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            min-height: 400px;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .footer {
            background: #000;
            padding: 2rem;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: auto;
        }

        .footer-links {
            margin-bottom: 1rem;
        }

        .footer-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            margin: 0 1rem;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: inline-block;
            transition: all 0.2s;
        }

        .footer-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .footer p {
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Messages</h1>
            <p>Gérez vos conversations avec les talents et agences</p>
        </div>

        <div class="messages-container">
            <div class="empty-state">
                <h3>💬 Aucun message</h3>
                <p>Vous n'avez pas encore de conversations. Commencez à discuter avec des talents ou des agences !</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="../terms.html" class="footer-link">Terms of Service</a>
            <a href="../privacy.html" class="footer-link">Privacy Policy</a>
            <a href="../contact.html" class="footer-link">Contact</a>
            <a href="../register-fixed.html" class="footer-link">S'inscrire</a>
            <a href="../login.html" class="footer-link">Se connecter</a>
        </div>
        <p>&copy; 2024 Talent & Agency. All rights reserved.</p>
    </footer>

    <script>
        // Initialiser Supabase
        const { createClient } = window.supabase;
        const supabase = createClient(
            window.SUPABASE_CONFIG.url,
            window.SUPABASE_CONFIG.anonKey
        );

        // Vérifier si l'agence a payé
        async function checkAgencyPayment() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                
                if (session) {
                    const { data: profile } = await supabase
                        .from('users')
                        .select('role, subscription_active')
                        .eq('id', session.user.id)
                        .single();
                    
                    if (profile && profile.role === 'agency' && !profile.subscription_active) {
                        window.location.href = '/pages/agency-pricing.html';
                        return false;
                    }
                }
                return true;
            } catch (error) {
                console.error('Erreur vérification paiement:', error);
                return true;
            }
        }

        // Vérifier l'authentification
        async function checkAuth() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                
                if (!session) {
                    window.location.href = '/login.html';
                    return false;
                }
                return true;
            } catch (error) {
                console.error('Erreur vérification auth:', error);
                window.location.href = '/login.html';
                return false;
            }
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', async () => {
            const canAccess = await checkAgencyPayment();
            if (!canAccess) return;
            
            await checkAuth();
        });
    </script>
</body>
</html>
