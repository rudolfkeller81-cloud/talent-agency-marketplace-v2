<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Annulé - Talent & Agency</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f59e0b 0%, #dc2626 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        
        .cancel-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        
        .cancel-icon {
            width: 80px;
            height: 80px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }
        
        h1 {
            color: #1f2937;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        p {
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            background: #1e3a8a;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 10px;
        }
        
        .btn:hover {
            background: #1e40af;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #6b7280;
        }
        
        .btn-secondary:hover {
            background: #4b5563;
        }
    </style>
</head>
<body>
    <div class="cancel-container">
        <div class="cancel-icon">✕</div>
        <h1>❌ Paiement Annulé</h1>
        <p>Le paiement a été annulé. Aucun montant n'a été débité de votre compte.</p>
        
        <p>Vous pouvez réessayer le paiement ou choisir une autre option :</p>
        
        <a href="/payment" class="btn">💳 Réessayer le paiement</a>
        <a href="/discover" class="btn btn-secondary">🔍 Continuer en mode gratuit</a>
        
        <p style="margin-top: 30px; font-size: 14px; color: #6b7280;">
            Besoin d'aide ? Contactez notre support.
        </p>
    </div>
</body>
</html>
