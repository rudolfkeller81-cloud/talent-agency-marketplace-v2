<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications System - Talent & Agency</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
            line-height: 1.6;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
            z-index: 10000;
            animation: slideIn 0.3s ease;
            max-width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .notification-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .notification-message {
            font-size: 0.875rem;
            opacity: 0.9;
        }
        
        .notification-close {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: background 0.2s ease;
        }
        
        .notification-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .notification.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }
        
        .notification.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
        }
        
        .notification.warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
        }
    </style>
</head>
<body>
    <h1>🔔 Système de Notifications</h1>
    <p>Ce fichier contient le système de notifications pour les messages et autres événements.</p>
    
    <button onclick="testNotification()" style="background: #3b82f6; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; margin: 1rem 0;">
        🧪 Tester Notification Message
    </button>
    
    <button onclick="testSuccessNotification()" style="background: #10b981; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; margin: 0.5rem;">
        ✅ Tester Notification Succès
    </button>
    
    <button onclick="testErrorNotification()" style="background: #ef4444; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; margin: 0.5rem;">
        ❌ Tester Notification Erreur
    </button>

    <script>
        // Notification System
        class NotificationSystem {
            constructor() {
                this.notifications = [];
                this.maxNotifications = 5;
            }
            
            show(message, type = 'info', duration = 5000, options = {}) {
                const notification = this.createNotification(message, type, options);
                this.addNotification(notification);
                
                // Auto-remove after duration
                if (duration > 0) {
                    setTimeout(() => {
                        this.removeNotification(notification.id);
                    }, duration);
                }
                
                return notification.id;
            }
            
            createNotification(message, type, options) {
                const id = 'notification_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.id = id;
                
                const icons = {
                    info: '💬',
                    success: '✅',
                    error: '❌',
                    warning: '⚠️',
                    message: '📩'
                };
                
                notification.innerHTML = `
                    <button class="notification-close" onclick="notificationSystem.removeNotification('${id}')">×</button>
                    <div class="notification-title">
                        <span>${icons[type] || icons.info}</span>
                        <span>${options.title || (type === 'message' ? 'Nouveau message' : 'Notification')}</span>
                    </div>
                    <div class="notification-message">${message}</div>
                    ${options.action ? `<button style="margin-top: 0.5rem; background: rgba(255,255,255,0.2); border: none; padding: 0.25rem 0.75rem; border-radius: 4px; color: white; font-size: 0.75rem; cursor: pointer;" onclick="${options.action.onclick}">${options.action.text}</button>` : ''}
                `;
                
                return {
                    id,
                    element: notification,
                    type,
                    message,
                    options
                };
            }
            
            addNotification(notification) {
                // Remove oldest if max reached
                if (this.notifications.length >= this.maxNotifications) {
                    const oldest = this.notifications.shift();
                    if (oldest.element.parentNode) {
                        oldest.element.remove();
                    }
                }
                
                this.notifications.push(notification);
                document.body.appendChild(notification.element);
                
                // Animate in
                setTimeout(() => {
                    notification.element.style.animation = 'slideIn 0.3s ease';
                }, 10);
            }
            
            removeNotification(id) {
                const index = this.notifications.findIndex(n => n.id === id);
                if (index !== -1) {
                    const notification = this.notifications[index];
                    notification.element.style.animation = 'slideOut 0.3s ease';
                    
                    setTimeout(() => {
                        if (notification.element.parentNode) {
                            notification.element.remove();
                        }
                        this.notifications.splice(index, 1);
                    }, 300);
                }
            }
            
            // Specific notification methods
            showMessage(senderName, message, conversationId) {
                return this.show(
                    `"${message}"`,
                    'message',
                    8000,
                    {
                        title: `Nouveau message de ${senderName}`,
                        action: {
                            text: 'Voir',
                            onclick: `window.location.href = '/messages?conversation=${conversationId}'`
                        }
                    }
                );
            }
            
            showSuccess(message, title = 'Succès') {
                return this.show(message, 'success', 4000, { title });
            }
            
            showError(message, title = 'Erreur') {
                return this.show(message, 'error', 6000, { title });
            }
            
            showWarning(message, title = 'Attention') {
                return this.show(message, 'warning', 5000, { title });
            }
            
            showInfo(message, title = 'Information') {
                return this.show(message, 'info', 4000, { title });
            }
        }
        
        // Global notification system
        window.notificationSystem = new NotificationSystem();
        
        // Test functions
        function testNotification() {
            window.notificationSystem.showMessage(
                'Creative Agency Paris',
                'Bonjour ! Nous sommes intéressés par votre profil.',
                'conv_1'
            );
        }
        
        function testSuccessNotification() {
            window.notificationSystem.showSuccess('Message envoyé avec succès !');
        }
        
        function testErrorNotification() {
            window.notificationSystem.showError('Erreur lors de l\'envoi du message');
        }
        
        // Add slide out animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(400px); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        // Simulate incoming messages
        setTimeout(() => {
            console.log('🔔 Notification system ready');
            console.log('Available methods:', Object.getOwnPropertyNames(window.notificationSystem).filter(name => typeof window.notificationSystem[name] === 'function'));
        }, 1000);
        
        // Auto-notification simulation (for demo)
        setTimeout(() => {
            if (window.location.pathname.includes('notifications.html')) {
                window.notificationSystem.showInfo('Le système de notifications est prêt !');
            }
        }, 2000);
    </script>
</body>
</html>
