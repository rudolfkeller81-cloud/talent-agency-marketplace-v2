<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites - Talent & Agency</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/auth-utils.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; }
        a { color: inherit; text-decoration: none; }

        /* Header */
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 1px 0 rgba(255,255,255,0.05);
        }
        .nav {
            max-width: 1200px; margin: 0 auto; padding: 0 2rem;
            display: flex; align-items: center; justify-content: space-between; height: 64px;
            position: relative;
        }
        .nav nav { position: absolute; left: 50%; transform: translateX(-50%); }
        .nav-brand { font-size: 1.25rem; font-weight: 800; color: #fff; }
        .nav-links { list-style: none; display: flex; gap: 2rem; align-items: center; }
        .nav-links a { color: rgba(255,255,255,0.6); font-weight: 500; font-size: 0.9rem; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: #3b82f6; }
        .profile-icon {
            width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.7);
        }

        /* Page container */
        .fav-container {
            max-width: 1200px; margin: 0 auto;
            padding: 6rem 2rem 3rem; min-height: 100vh;
        }

        /* Search */
        .search-section { margin-bottom: 2rem; padding: 1rem 0; }
        .search-container { position: relative; max-width: 448px; width: 100%; margin: 0 auto; }
        .search-input {
            width: 100%; padding: 0.75rem 1rem; padding-right: 2.5rem;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: #fff; font-size: 0.95rem; outline: none; transition: border-color 0.2s;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.3); }
        .search-input:focus { border-color: rgba(59,130,246,0.4); }
        .search-icon {
            position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,0.4); pointer-events: none;
        }

        /* Favorite Cards */
        .favorite-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 1.5rem; transition: all 0.3s; position: relative;
        }
        .favorite-card:hover {
            border-color: rgba(59,130,246,0.2); transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .favorite-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .favorite-avatar {
            width: 60px; height: 60px; border-radius: 50%; overflow: hidden;
            background: rgba(255,255,255,0.05); display: flex; align-items: center;
            justify-content: center; flex-shrink: 0;
        }
        .favorite-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-fallback { color: rgba(255,255,255,0.6); font-weight: 600; font-size: 1.2rem; }
        .favorite-info { flex: 1; min-width: 0; }
        .favorite-name { font-size: 1.25rem; font-weight: 700; color: #fff; margin: 0 0 0.25rem 0; }
        .favorite-role { color: rgba(255,255,255,0.5); font-size: 0.9rem; font-weight: 500; }
        .favorite-indicator {
            position: absolute; top: 1rem; right: 1rem; width: 2.5rem; height: 2.5rem;
            background: rgba(239,68,68,0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; border: 1px solid rgba(239,68,68,0.2); color: #ef4444;
        }
        .favorite-content { margin-top: 1rem; }
        .favorite-bio { color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 1rem; }
        .favorite-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
        .meta-tag {
            background: rgba(59,130,246,0.1); color: rgba(59,130,246,0.8);
            padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem;
            font-weight: 500; border: 1px solid rgba(59,130,246,0.2);
        }
        .favorite-actions { display: flex; gap: 1rem; }
        .favorite-btn {
            flex: 1; padding: 0.75rem 1rem; border: none; border-radius: 8px;
            font-weight: 600; font-size: 0.875rem; cursor: pointer; transition: all 0.3s;
        }
        .favorite-btn-primary {
            background: rgba(59,130,246,0.1); color: #fff; border: 1px solid rgba(59,130,246,0.3);
        }
        .favorite-btn-primary:hover { background: rgba(59,130,246,0.2); transform: translateY(-1px); }
        .favorite-btn-secondary {
            background: rgba(255,255,255,0.03); color: #fff; border: 1px solid rgba(255,255,255,0.08);
        }
        .favorite-btn-secondary:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }

        .empty-state { text-align: center; padding: 4rem 2rem; color: rgba(255,255,255,0.5); }
        .empty-state h3 { font-size: 1.5rem; margin-bottom: 1rem; color: rgba(255,255,255,0.7); }
        .empty-state p { margin-bottom: 2rem; }

        /* Profile Cards - Same as discover */
        .profile-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            color: #fff;
            position: relative;
            padding: 24px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .profile-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            border-color: #333;
        }

        .profile-card:active {
            transform: translateY(0px);
        }

        .profile-header {
            position: relative;
            z-index: 2;
        }

        .profile-avatar {
            position: absolute;
            top: 0px;
            left: 2px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a3a3a, #222);
            border: 2px solid #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -1px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            z-index: 2;
            flex-shrink: 0;
            overflow: hidden;
        }

        .profile-info {
            padding-top: 60px;
        }

        .profile-name-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
        }

        .profile-name {
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.3px;
            line-height: 1.2;
            margin: 0;
        }

        .profile-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .profile-details {
            margin: 10px 0 15px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 12px;
            color: #666;
            font-weight: 500;
        }

        .detail-value {
            font-size: 12px;
            color: #fff;
            font-weight: 600;
        }

        .profile-location {
            font-size: 12px;
            color: #666;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .profile-bio {
            margin: 0 0 18px;
            font-size: 13px;
            color: #888;
            line-height: 1.55;
            font-weight: 400;
        }

        .profile-actions {
            display: flex;
            gap: 8px;
        }

        .profile-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            white-space: nowrap;
            text-align: center;
            line-height: 1;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .profile-btn-primary {
            background: #fff;
            color: #000;
            border: none;
            flex: 1;
        }

        .profile-btn-primary:hover {
            background: #f0f0f0;
            transform: translateY(-1px);
        }

        .profile-btn-secondary {
            background: transparent;
            color: #fff;
            border: 1px solid #2a2a2a;
            padding: 10px 20px;
        }

        .profile-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #3a3a3a;
            transform: translateY(-1px);
        }

        .profiles-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem;
        }

        .loading-state { text-align: center; padding: 4rem 2rem; color: rgba(255,255,255,0.5); }
        .loading-spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6; border-radius: 50%; margin: 0 auto 1rem;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-discover {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.5rem; background: #3b82f6; color: #fff;
            border-radius: 8px; font-weight: 600; font-size: 0.9rem; transition: background 0.2s;
        }
        .btn-discover:hover { background: #2563eb; }

        @media (max-width: 768px) {
            .fav-container { padding: 5rem 1rem 2rem; }
            .profiles-grid { grid-template-columns: 1fr; }
            .nav-links { gap: 1rem; }
        }
    </style>
</head>
    <body>
        <!-- Header -->
        <header class="header">
            <div class="nav">
                <a href="/" class="nav-brand">Talent & Agency</a>
                <nav>
                    <ul class="nav-links">
                        <li><a href="/discover">Discover</a></li>
                        <li><a href="/favorites" class="active">Favorites</a></li>
                        <li><a href="/messages">Messages</a></li>
                    </ul>
                </nav>
                <div class="nav-actions">
                    <div class="profile-icon" onclick="window.location.href='/profile'" title="My Profile">
                        <img id="navAvatarImg" src="" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:none;">
                        <span id="navAvatarFallback">?</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="fav-container">
            <!-- Search Section -->
            <section class="search-section">
                <div class="search-container">
                    <input type="text" class="search-input" id="searchInput" placeholder="Rechercher...">
                    <div class="search-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </div>
                </div>
            </section>

            
            <!-- Profiles Grid -->
            <section class="profiles-grid" id="favoritesGrid">
                <!-- Favorites will be loaded dynamically from API -->
            </section>
        </div>

        <script>
            let allFavorites = [];

            // Initialize
            document.addEventListener('DOMContentLoaded', function() {
                loadNavAvatar();
                loadFavorites();
                document.getElementById('searchInput').addEventListener('input', handleSearch);
            });

            // Load user avatar/initials in header
            async function loadNavAvatar() {
                try {
                    const token = Auth.getToken();
                    if (!token) return;
                    const res = await fetch('/api/user/profile', { headers: { 'Authorization': 'Bearer ' + token } });
                    if (!res.ok) return;
                    const data = await res.json();
                    if (!data.success || !data.data) return;
                    const d = data.data;
                    const name = d.talent_display_name || d.agency_name || ((d.first_name || '') + ' ' + (d.last_name || '')).trim();
                    const initials = name.split(' ').map(n => n[0] || '').join('').toUpperCase() || '?';
                    const img = document.getElementById('navAvatarImg');
                    const fallback = document.getElementById('navAvatarFallback');
                    if (d.avatar_url) {
                        img.src = d.avatar_url;
                        img.style.display = 'block';
                        fallback.style.display = 'none';
                    } else {
                        fallback.textContent = initials;
                    }
                } catch(e) { console.error('Nav avatar error:', e); }
            }

            // API calls
            const favoritesAPI = {
                async getFavorites() {
                    try {
                        const token = Auth.getToken();
                        if (!token) return [];
                        const response = await fetch('/api/favorites', {
                            headers: { 'Authorization': 'Bearer ' + token }
                        });
                        if (!response.ok) return [];
                        const data = await response.json();
                        return data.data || [];
                    } catch (error) {
                        console.error('Error loading favorites:', error);
                        return [];
                    }
                },
                async removeFavorite(profileId) {
                    const token = Auth.getToken();
                    const response = await fetch('/api/favorites/' + profileId, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (!response.ok) throw new Error('Failed to remove');
                    return true;
                }
            };

            // Load favorites
            async function loadFavorites() {
                const grid = document.getElementById('favoritesGrid');
                grid.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><h3>Loading favorites...</h3></div>';

                if (!Auth.isLoggedIn()) {
                    showEmptyState('Please log in to view your favorites');
                    return;
                }

                allFavorites = await favoritesAPI.getFavorites();

                if (allFavorites.length === 0) {
                    showEmptyState('No favorites yet. Start adding profiles from the Discover page!');
                    return;
                }

                displayFavorites(allFavorites);
            }

            // Search
            function handleSearch(event) {
                const term = event.target.value.toLowerCase().trim();
                if (!term) { displayFavorites(allFavorites); return; }

                const filtered = allFavorites.filter(f => {
                    return (f.display_name || '').toLowerCase().includes(term) ||
                           (f.specialty || '').toLowerCase().includes(term) ||
                           (f.bio || '').toLowerCase().includes(term) ||
                           (f.country || '').toLowerCase().includes(term);
                });

                if (filtered.length === 0) {
                    showEmptyState('No favorites found for "' + event.target.value + '"');
                } else {
                    displayFavorites(filtered);
                }
            }

            // Display favorites
            function displayFavorites(favorites) {
                const grid = document.getElementById('favoritesGrid');
                grid.innerHTML = '';

                favorites.forEach((fav, i) => {
                    const card = createFavoriteCard(fav);
                    card.style.opacity = '0';
                    card.style.transform = 'translateY(20px)';
                    card.style.transition = 'all 0.3s ease';
                    grid.appendChild(card);
                    setTimeout(() => { card.style.opacity = '1'; card.style.transform = 'translateY(0)'; }, i * 80);
                });
            }

            // Create card
            function createFavoriteCard(fav) {
                const card = document.createElement('div');
                card.className = 'profile-card';
                card.id = 'fav-card-' + fav.id;
                
                const name = fav.display_name || fav.stageName || ((fav.first_name || '') + ' ' + (fav.last_name || '')).trim() || 'Unknown';
                const initials = name.split(' ').map(n => n[0] || '').join('').toUpperCase() || '?';
                const isAgency = fav.talent_count !== undefined && fav.talent_count !== null;
                
                if (!isAgency) {
                    // Talent card - same style as discover
                    card.innerHTML = `
                        <div class="profile-header">
                            <div class="profile-avatar">${initials}</div>
                            <div class="profile-info">
                                <div class="profile-name-row">
                                    <h3 class="profile-name">${name}</h3>
                                    <span class="profile-badge">TALENT</span>
                                </div>
                                <div class="profile-details">
                                    <div class="detail-item">
                                        <span class="detail-label">Age</span>
                                        <span class="detail-value">${fav.age || 'N/A'}</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">Revenue</span>
                                        <span class="detail-value">${fav.revenue || 'N/A'}</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">Manager</span>
                                        <span class="detail-value">${fav.has_manager || 'N/A'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="profile-body">
                            <div class="profile-location">${fav.country || 'N/A'}</div>
                            <div class="profile-bio">${fav.bio || ''}</div>
                        </div>
                        <div class="profile-actions" onclick="event.stopPropagation()">
                            <button class="profile-btn profile-btn-secondary" onclick="sendMessage(${fav.id}, '${name.replace(/'/g, "\\'")}')">
                                <span class="btn-text">Message</span>
                            </button>
                            <button class="profile-btn profile-btn-primary" onclick="removeFavorite(${fav.id})">
                                <span class="btn-text">Remove</span>
                            </button>
                        </div>
                    `;
                } else {
                    // Agency card - same style as discover
                    card.innerHTML = `
                        <div class="profile-header">
                            <div class="profile-avatar">${initials}</div>
                            <div class="profile-info">
                                <div class="profile-name-row">
                                    <h3 class="profile-name">${name}</h3>
                                    <span class="profile-badge">AGENCY</span>
                                </div>
                                <div class="profile-details">
                                    <div class="detail-item">
                                        <span class="detail-label">Talent Count</span>
                                        <span class="detail-value">${fav.talent_count || 'N/A'}</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">Revenue</span>
                                        <span class="detail-value">${fav.revenue || 'N/A'}</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">Total Revenue</span>
                                        <span class="detail-value">${fav.total_revenue || 'N/A'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="profile-body">
                            <div class="profile-location">${fav.country || 'N/A'}</div>
                            <div class="profile-bio">${fav.bio || fav.description || ''}</div>
                        </div>
                        <div class="profile-actions" onclick="event.stopPropagation()">
                            <button class="profile-btn profile-btn-secondary" onclick="sendMessage(${fav.id}, '${name.replace(/'/g, "\\'")}')">
                                <span class="btn-text">Message</span>
                            </button>
                            <button class="profile-btn profile-btn-primary" onclick="removeFavorite(${fav.id})">
                                <span class="btn-text">Remove</span>
                            </button>
                        </div>
                    `;
                }
                return card;
            }

            // Send message function
            async function sendMessage(profileId, name) {
                openChatInterface(profileId, name);
            }

            async function openChatInterface(profileId, name) {
                // Ouvrir l'interface de chat directe avec ce profil
                const modal = document.createElement('div');
                modal.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: rgba(0,0,0,0.8);
                    z-index: 1000;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    backdrop-filter: blur(10px);
                `;
                
                modal.innerHTML = `
                    <div style="
                        width: 90%;
                        max-width: 800px;
                        height: 80vh;
                        max-height: 600px;
                        background: #0a0a0a;
                        border-radius: 1rem;
                        border: 1px solid #2a2a2a;
                        display: flex;
                        flex-direction: column;
                        overflow: hidden;
                    ">
                        <!-- Header -->
                        <div style="
                            padding: 1rem 1.5rem;
                            background: #111111;
                            border-bottom: 1px solid #2a2a2a;
                            display: flex;
                            align-items: center;
                            justify-content: space-between;
                        ">
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <div style="
                                    width: 40px;
                                    height: 40px;
                                    border-radius: 50%;
                                    background: #3b82f6;
                                    display: flex;
                                    align-items: center;
                                    justify-content: center;
                                    color: white;
                                    font-weight: 600;
                                ">${name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase()}</div>
                                <div>
                                    <h3 style="margin: 0; font-size: 1rem; font-weight: 600;">${name}</h3>
                                    <p style="margin: 0; font-size: 0.85rem; color: #a0a0a0;">Active now</p>
                                </div>
                            </div>
                            <button onclick="closeChatModal()" style="
                                background: none;
                                border: none;
                                color: #a0a0a0;
                                font-size: 1.5rem;
                                cursor: pointer;
                                padding: 0.5rem;
                                border-radius: 0.5rem;
                                transition: all 0.2s;
                            " onmouseover="this.style.background='#1a1a1a'; this.style.color='#ffffff';" 
                               onmouseout="this.style.background='none'; this.style.color='#a0a0a0';">×</button>
                        </div>
                        
                        <!-- Messages Container -->
                        <div id="chatMessages" style="
                            flex: 1;
                            padding: 1.5rem;
                            overflow-y: auto;
                            display: flex;
                            flex-direction: column;
                            gap: 1rem;
                        ">
                            <div style="text-align: center; color: #a0a0a0; padding: 2rem;">
                                <i class="fas fa-comment-dots" style="font-size: 2rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                                <p>Start the conversation with ${name}</p>
                            </div>
                        </div>
                        
                        <!-- Input -->
                        <div style="
                            padding: 1rem 1.5rem;
                            background: #111111;
                            border-top: 1px solid #2a2a2a;
                        ">
                            <div style="display: flex; gap: 0.75rem; align-items: flex-end;">
                                <button style="
                                    width: 44px;
                                    height: 44px;
                                    border-radius: 50%;
                                    border: none;
                                    background: #1a1a1a;
                                    color: #a0a0a0;
                                    cursor: pointer;
                                    transition: all 0.2s;
                                " onmouseover="this.style.background='#2a2a2a'; this.style.color='#ffffff';" 
                                   onmouseout="this.style.background='#1a1a1a'; this.style.color='#a0a0a0';">
                                    <i class="fas fa-paperclip"></i>
                                </button>
                                <textarea id="chatInput" style="
                                    flex: 1;
                                    padding: 0.75rem 1rem;
                                    background: #1a1a1a;
                                    border: 1px solid #2a2a2a;
                                    border-radius: 1.5rem;
                                    color: #ffffff;
                                    font-size: 0.9rem;
                                    resize: none;
                                    min-height: 44px;
                                    max-height: 120px;
                                    font-family: inherit;
                                " placeholder="Type a message..." rows="1"></textarea>
                                <button id="sendChatBtn" onclick="sendChatMessage(${profileId})" style="
                                    width: 44px;
                                    height: 44px;
                                    border-radius: 50%;
                                    border: none;
                                    background: #3b82f6;
                                    color: white;
                                    cursor: pointer;
                                    transition: all 0.2s;
                                    display: flex;
                                    align-items: center;
                                    justify-content: center;
                                " onmouseover="this.style.background='#60a5fa';" 
                                   onmouseout="this.style.background='#3b82f6';">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display: block;">
                                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // Setup event listeners
                const input = document.getElementById('chatInput');
                const sendBtn = document.getElementById('sendChatBtn');
                
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendChatMessage(profileId);
                    }
                });
                
                input.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
                });
                
                // Focus input
                input.focus();
                
                // Load existing messages
                loadChatMessages(profileId);
            }

            function closeChatModal() {
                const modal = document.querySelector('div[style*="position: fixed"]');
                if (modal) {
                    modal.remove();
                }
            }

            async function loadChatMessages(profileId) {
                try {
                    const response = await fetch('/api/messages', {
                        headers: { 
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        const messages = result.data || [];
                        
                        // Filter messages for this conversation (Alice 22 <-> profileId)
                        const conversationMessages = messages.filter(msg => 
                            (msg.sender_id == 22 && msg.receiver_id == profileId) ||
                            (msg.sender_id == profileId && msg.receiver_id == 22)
                        );
                        
                        conversationMessages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                        
                        displayChatMessages(conversationMessages);
                    }
                } catch (error) {
                    console.error('Error loading messages:', error);
                }
            }

            function displayChatMessages(messages) {
                const container = document.getElementById('chatMessages');
                
                // Get current user ID
                const userData = JSON.parse(localStorage.getItem('userData') || '{}');
                const currentUserId = userData.id;
                
                if (messages.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; color: #a0a0a0; padding: 2rem;">
                            <i class="fas fa-comment-dots" style="font-size: 2rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                            <p>Start the conversation!</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = messages.map(msg => {
                    const isSent = msg.sender_id == currentUserId;
                    const senderName = msg.sender_first_name || 'Unknown';
                    
                    return `
                        <div style="
                            display: flex;
                            gap: 0.75rem;
                            max-width: 70%;
                            ${isSent ? 'align-self: flex-end; flex-direction: row-reverse;' : ''}
                        ">
                            <div style="
                                width: 32px;
                                height: 32px;
                                border-radius: 50%;
                                background: #3b82f6;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                font-size: 0.75rem;
                                font-weight: 600;
                                color: white;
                                flex-shrink: 0;
                            ">${senderName[0]?.toUpperCase() || '?'}</div>
                            <div style="display: flex; flex-direction: column; gap: 0.25rem;">
                                <div style="
                                    padding: 0.75rem 1rem;
                                    border-radius: 1rem;
                                    font-size: 0.9rem;
                                    line-height: 1.4;
                                    word-wrap: break-word;
                                    ${isSent ? 
                                        'background: #3b82f6; color: white; border-bottom-right-radius: 0.25rem;' : 
                                        'background: #1a1a1a; border: 1px solid #2a2a2a; border-bottom-left-radius: 0.25rem;'
                                    }
                                ">${msg.content}</div>
                                <div style="
                                    font-size: 0.7rem;
                                    color: #a0a0a0;
                                    padding: 0 0.5rem;
                                    ${isSent ? 'text-align: right;' : ''}
                                ">${formatChatTime(new Date(msg.created_at))}</div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                // Scroll to bottom
                container.scrollTop = container.scrollHeight;
            }

            async function sendChatMessage(profileId) {
                const input = document.getElementById('chatInput');
                const content = input.value.trim();
                
                if (!content) return;
                
                const sendBtn = document.getElementById('sendChatBtn');
                sendBtn.disabled = true;
                
                try {
                    const response = await fetch('/api/messages/conversations', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ 
                            participantId: profileId, 
                            content: content,
                            senderId: 22 // Alice's ID
                        })
                    });
                    
                    if (response.ok) {
                        // Clear input
                        input.value = '';
                        input.style.height = 'auto';
                        
                        // Add message immediately to UI for instant feedback
                        const container = document.getElementById('chatMessages');
                        const messageHtml = `
                            <div style="
                                display: flex;
                                gap: 0.75rem;
                                max-width: 70%;
                                align-self: flex-end;
                                flex-direction: row-reverse;
                                margin-bottom: 1rem;
                            ">
                                <div style="
                                    width: 32px;
                                    height: 32px;
                                    border-radius: 50%;
                                    background: #3b82f6;
                                    display: flex;
                                    align-items: center;
                                    justify-content: center;
                                    font-size: 0.75rem;
                                    font-weight: 600;
                                    color: white;
                                    flex-shrink: 0;
                                ">A</div>
                                <div style="display: flex; flex-direction: column; gap: 0.25rem;">
                                    <div style="
                                        padding: 0.75rem 1rem;
                                        border-radius: 1rem;
                                        font-size: 0.9rem;
                                        line-height: 1.4;
                                        word-wrap: break-word;
                                        background: #3b82f6; color: white; border-bottom-right-radius: 0.25rem;
                                    ">${content}</div>
                                    <div style="
                                        font-size: 0.7rem;
                                        color: #a0a0a0;
                                        padding: 0 0.5rem;
                                        text-align: right;
                                    ">just now</div>
                                </div>
                            </div>
                        `;
                        
                        // Remove empty state if exists
                        if (container.innerHTML.includes('Start the conversation')) {
                            container.innerHTML = '';
                        }
                        
                        // Add new message
                        container.innerHTML += messageHtml;
                        
                        // Scroll to bottom
                        setTimeout(() => {
                            container.scrollTop = container.scrollHeight;
                        }, 100);
                        
                        // Reload conversations after sending to update the list
                        setTimeout(() => {
                            if (typeof loadConversations === 'function') {
                                loadConversations();
                            }
                        }, 1000);
                    } else {
                        const result = await response.json();
                        alert('Error sending message: ' + (result.error || 'Unknown error'));
                    }
                } catch (error) {
                    console.error('Error sending message:', error);
                    alert('Error sending message: ' + error.message);
                } finally {
                    sendBtn.disabled = false;
                }
            }

            function formatChatTime(date) {
                const now = new Date();
                const diff = now - date;
                const minutes = Math.floor(diff / 60000);
                const hours = Math.floor(diff / 3600000);
                const days = Math.floor(diff / 86400000);
                
                if (minutes < 1) return 'just now';
                if (minutes < 60) return `${minutes}m ago`;
                if (hours < 24) return `${hours}h ago`;
                if (days < 7) return `${days}d ago`;
                
                return date.toLocaleDateString();
            }

            // Remove favorite
            async function removeFavorite(profileId) {
                if (!confirm('Remove this profile from favorites?')) return;
                try {
                    await favoritesAPI.removeFavorite(profileId);
                    allFavorites = allFavorites.filter(f => f.id !== profileId);
                    showNotification('Removed from favorites', 'info');
                    if (allFavorites.length === 0) {
                        showEmptyState('No favorites yet. Start adding profiles from the Discover page!');
                    } else {
                        displayFavorites(allFavorites);
                    }
                } catch (e) {
                    showNotification('Error removing favorite', 'error');
                }
            }

            // Empty state
            function showEmptyState(message) {
                const grid = document.getElementById('favoritesGrid');
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div style="font-size:4rem;margin-bottom:1rem;">&#9825;</div>
                        <h3>No Favorites Yet</h3>
                        <p>${message}</p>
                        <a href="/discover" class="btn-discover">Discover Profiles</a>
                    </div>
                `;
            }

            // Notification
            function showNotification(message, type) {
                const n = document.createElement('div');
                n.textContent = message;
                const colors = { success: '#22c55e', error: '#ef4444', info: '#3b82f6', warning: '#f59e0b' };
                n.style.cssText = 'position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-weight:500;z-index:10000;opacity:0;transform:translateX(100%);transition:all 0.3s;background:' + (colors[type] || colors.info);
                document.body.appendChild(n);
                setTimeout(() => { n.style.opacity = '1'; n.style.transform = 'translateX(0)'; }, 50);
                setTimeout(() => { n.style.opacity = '0'; n.style.transform = 'translateX(100%)'; setTimeout(() => n.remove(), 300); }, 3000);
            }

            function doLogout() { Auth.logout(); }
        </script>

    </body>
</html>
