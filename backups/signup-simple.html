<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - Talent & Agency</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .signup-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }

        .form-select option {
            background: #1a1a1a;
            color: #fff;
        }

        .submit-btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .form-links {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .form-links a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .form-links a:hover {
            color: #60a5fa;
        }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: rgba(239, 68, 68, 0.9);
        }

        .message.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: rgba(34, 197, 94, 0.9);
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-field {
            border-color: rgba(239, 68, 68, 0.5) !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
        }

        .error-text {
            color: rgba(239, 68, 68, 0.9);
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.8rem;
        }

        .strength-weak { color: rgba(239, 68, 68, 0.9); }
        .strength-medium { color: rgba(245, 158, 11, 0.9); }
        .strength-strong { color: rgba(34, 197, 94, 0.9); }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo">
            <h1>Talent & Agency</h1>
            <p>Create your account</p>
        </div>

        <div id="message-container"></div>

        <form id="signupForm">
            <div class="form-group">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" id="name" name="name" class="form-input" placeholder="Enter your full name" required>
                <div class="error-text" id="name-error"></div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
                <div class="error-text" id="email-error"></div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Create a strong password" required>
                <div class="password-strength" id="password-strength"></div>
                <div class="error-text" id="password-error"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="Confirm your password" required>
                <div class="error-text" id="confirmPassword-error"></div>
            </div>

            <div class="form-group">
                <label for="role" class="form-label">I am a</label>
                <select id="role" name="role" class="form-select" required>
                    <option value="">Select your role</option>
                    <option value="talent">Talent (Artist, Performer, Creator)</option>
                    <option value="agency">Agency (Representative, Manager)</option>
                </select>
                <div class="error-text" id="role-error"></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span id="btn-text">Create Account</span>
            </button>
        </form>

        <div class="form-links">
            <p>Already have an account? <a href="login.html">Sign in</a></p>
        </div>
    </div>

    <script>
        let isLoading = false;

        // Utility functions
        function showMessage(message, type = 'error') {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="message ${type}">${message}</div>`;
            
            // Auto-remove success messages
            if (type === 'success') {
                setTimeout(() => {
                    container.innerHTML = '';
                }, 5000);
            }
        }

        function clearErrors() {
            document.querySelectorAll('.form-input, .form-select').forEach(input => {
                input.classList.remove('error-field');
            });
            document.querySelectorAll('.error-text').forEach(error => {
                error.textContent = '';
            });
            document.getElementById('message-container').innerHTML = '';
        }

        function showError(field, message) {
            const input = document.getElementById(field);
            const errorText = document.getElementById(`${field}-error`);
            
            input.classList.add('error-field');
            errorText.textContent = message;
        }

        function setLoading(loading) {
            isLoading = loading;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btn-text');
            
            if (loading) {
                submitBtn.disabled = true;
                btnText.innerHTML = '<span class="loading"></span> Creating account...';
            } else {
                submitBtn.disabled = false;
                btnText.textContent = 'Create Account';
            }
        }

        function checkPasswordStrength(password) {
            const strengthEl = document.getElementById('password-strength');
            
            if (password.length < 6) {
                strengthEl.textContent = 'Weak password';
                strengthEl.className = 'password-strength strength-weak';
                return 'weak';
            } else if (password.length < 10 || !/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
                strengthEl.textContent = 'Medium strength';
                strengthEl.className = 'password-strength strength-medium';
                return 'medium';
            } else {
                strengthEl.textContent = 'Strong password';
                strengthEl.className = 'password-strength strength-strong';
                return 'strong';
            }
        }

        // Form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (isLoading) return;
            
            clearErrors();
            setLoading(true);
            
            try {
                const formData = new FormData(e.target);
                const data = {
                    name: formData.get('name'),
                    email: formData.get('email'),
                    password: formData.get('password'),
                    role: formData.get('role')
                };
                
                // Validate passwords match
                if (data.password !== formData.get('confirmPassword')) {
                    showError('confirmPassword', 'Passwords do not match');
                    throw new Error('Passwords do not match');
                }
                
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (!response.ok) {
                    // Handle specific field errors
                    if (result.field) {
                        showError(result.field, result.error);
                        throw new Error(result.error || 'Registration failed');
                    }
                    throw new Error(result.error || 'Registration failed');
                }
                
                showMessage('Account created successfully! Redirecting...', 'success');
                
                // Store session
                if (result.remember) {
                    localStorage.setItem('sessionId', result.sessionId);
                } else {
                    sessionStorage.setItem('sessionId', result.sessionId);
                }
                document.cookie = `sessionId=${result.sessionId}; path=/; max-age=86400`;
                
                // Store user info
                localStorage.setItem('user', JSON.stringify(result.user));
                
                // Redirect to discover after delay
                setTimeout(() => {
                    window.location.href = 'discover.html';
                }, 2000);
                
            } catch (error) {
                showMessage(error.message, 'error');
            } finally {
                setLoading(false);
            }
        });

        // Real-time validation
        document.getElementById('name').addEventListener('blur', function() {
            const name = this.value.trim();
            if (!name) {
                showError('name', 'Name is required');
            } else if (name.length < 2) {
                showError('name', 'Name must be at least 2 characters');
            } else {
                this.classList.remove('error-field');
                document.getElementById('name-error').textContent = '';
            }
        });

        document.getElementById('email').addEventListener('blur', function() {
            const email = this.value.trim();
            if (!email) {
                showError('email', 'Email is required');
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('email', 'Please enter a valid email address');
            } else {
                this.classList.remove('error-field');
                document.getElementById('email-error').textContent = '';
            }
        });

        document.getElementById('password').addEventListener('input', function() {
            checkPasswordStrength(this.value);
        });

        document.getElementById('password').addEventListener('blur', function() {
            const password = this.value;
            if (!password) {
                showError('password', 'Password is required');
            } else if (password.length < 6) {
                showError('password', 'Password must be at least 6 characters');
            } else {
                this.classList.remove('error-field');
                document.getElementById('password-error').textContent = '';
            }
        });

        document.getElementById('confirmPassword').addEventListener('blur', function() {
            const password = document.getElementById('password').value;
            const confirmPassword = this.value;
            
            if (!confirmPassword) {
                showError('confirmPassword', 'Please confirm your password');
            } else if (password !== confirmPassword) {
                showError('confirmPassword', 'Passwords do not match');
            } else {
                this.classList.remove('error-field');
                document.getElementById('confirmPassword-error').textContent = '';
            }
        });

        document.getElementById('role').addEventListener('change', function() {
            if (!this.value) {
                showError('role', 'Please select your role');
            } else {
                this.classList.remove('error-field');
                document.getElementById('role-error').textContent = '';
            }
        });

        // Focus first input on load
        window.addEventListener('load', () => {
            document.getElementById('name').focus();
        });
    </script>
</body>
</html>
