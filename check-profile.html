<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Profile Data</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000000;
            color: #ffffff;
            line-height: 1.5;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .section h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #3b82f6;
        }

        .data-display {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
            margin: 0.5rem;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .field-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .field-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .field-name {
            font-weight: 600;
            color: #3b82f6;
            margin-bottom: 0.25rem;
        }

        .field-value {
            color: rgba(255, 255, 255, 0.8);
            word-break: break-all;
        }

        .empty {
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Check Your Profile Data</h1>

        <div class="section">
            <h2>📊 Current Profile Data</h2>
            <div id="profile-data" class="data-display">Loading...</div>
            <button class="btn btn-primary" onclick="loadProfileData()">🔄 Refresh Data</button>
        </div>

        <div class="section">
            <h2>📋 Profile Fields</h2>
            <div id="fields-list"></div>
        </div>

        <div class="section">
            <h2>🔧 Actions</h2>
            <button class="btn btn-danger" onclick="clearAllData()">🗑️ Clear All Data</button>
            <button class="btn btn-secondary" onclick="goToProfile()">👤 Go to Profile</button>
            <button class="btn btn-secondary" onclick="goToSetup()">⚙️ Setup Profile</button>
        </div>
    </div>

    <script>
        function loadProfileData() {
            const savedProfile = localStorage.getItem('userProfile');
            const dataDisplay = document.getElementById('profile-data');
            const fieldsList = document.getElementById('fields-list');
            
            if (savedProfile) {
                try {
                    const profileData = JSON.parse(savedProfile);
                    dataDisplay.textContent = JSON.stringify(profileData, null, 2);
                    
                    // Display fields in a readable format
                    let fieldsHtml = '<div class="field-list">';
                    
                    Object.keys(profileData).forEach(key => {
                        const value = profileData[key];
                        const displayValue = value === '' || value === null || value === undefined 
                            ? '<span class="empty">(empty)</span>' 
                            : String(value);
                        
                        fieldsHtml += `
                            <div class="field-item">
                                <div class="field-name">${key}:</div>
                                <div class="field-value">${displayValue}</div>
                            </div>
                        `;
                    });
                    
                    fieldsHtml += '</div>';
                    fieldsList.innerHTML = fieldsHtml;
                    
                } catch (e) {
                    dataDisplay.textContent = 'Error parsing profile data: ' + e.message;
                    fieldsList.innerHTML = '<div class="empty">Could not parse profile data</div>';
                }
            } else {
                dataDisplay.textContent = 'No profile data found in localStorage';
                fieldsList.innerHTML = '<div class="empty">No data stored</div>';
            }
        }

        function clearAllData() {
            if (confirm('Are you sure you want to delete all profile data? This cannot be undone.')) {
                localStorage.removeItem('userProfile');
                loadProfileData();
                alert('All profile data has been cleared!');
            }
        }

        function goToProfile() {
            window.location.href = '/profile';
        }

        function goToSetup() {
            window.location.href = '/setup-profile';
        }

        // Load data on page load
        window.addEventListener('DOMContentLoaded', loadProfileData);
    </script>
</body>
</html>
