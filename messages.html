<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Talent & Agency</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/auth-utils.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; }
        a { color: inherit; text-decoration: none; }

        /* Header */
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 1px 0 rgba(255,255,255,0.05);
        }
        .nav {
            max-width: 1200px; margin: 0 auto; padding: 0 2rem;
            display: flex; align-items: center; justify-content: space-between; height: 64px;
            position: relative;
        }
        .nav nav { position: absolute; left: 50%; transform: translateX(-50%); }
        .nav-brand { font-size: 1.25rem; font-weight: 800; color: #fff; }
        .nav-links { list-style: none; display: flex; gap: 2rem; align-items: center; }
        .nav-links a { color: rgba(255,255,255,0.6); font-weight: 500; font-size: 0.9rem; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: #3b82f6; }
        .profile-icon {
            width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.7);
        }

        .msg-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 6rem 2rem 2rem;
            min-height: 100vh;
        }

        .page-title { font-size: 2rem; font-weight: 600; margin-bottom: 0.5rem; color: #fff; }
        .subtitle { color: rgba(255, 255, 255, 0.6); margin-bottom: 2rem; }

        /* Messages Layout */
        .messages-layout {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Conversations List */
        .conversations-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1.5rem;
            overflow-y: auto;
            min-height: 400px;
        }

        .msg-section-title { font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem; color: #fff; }

        .conversation {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
            visibility: visible;
        }
        .conversation:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.12); transform: translateY(-1px); }
        .conversation.active { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.15); }

        .conversation-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .conversation-name { font-weight: 600; color: #fff; font-size: 1rem; }
        .conversation-time { font-size: 0.75rem; color: rgba(255, 255, 255, 0.7); }
        .conversation-message { color: rgba(255, 255, 255, 0.8); font-size: 0.875rem; line-height: 1.4; }

        .unread-indicator {
            width: 8px; height: 8px; background: #3b82f6; border-radius: 50%;
            margin-left: 0.5rem; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Chat Section */
        .chat-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header { padding: 1.5rem; border-bottom: 1px solid rgba(255, 255, 255, 0.08); background: rgba(255, 255, 255, 0.02); }
        .chat-participant { font-weight: 600; color: #fff; margin-bottom: 0.25rem; }
        .chat-status { font-size: 0.875rem; color: rgba(255, 255, 255, 0.5); }

        .chat-messages { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }

        .message { max-width: 70%; padding: 0.75rem 1rem; border-radius: 12px; line-height: 1.4; }
        .message.sent { align-self: flex-end; background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: white; }
        .message.received { align-self: flex-start; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #fff; }
        .message-time { font-size: 0.75rem; opacity: 0.7; margin-top: 0.25rem; }

        .chat-input-container { padding: 1.5rem; border-top: 1px solid rgba(255, 255, 255, 0.08); background: rgba(255, 255, 255, 0.02); }
        .chat-input-form { display: flex; gap: 0.75rem; }
        .chat-input {
            flex: 1; padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px; color: #fff; font-size: 0.875rem; transition: all 0.2s;
        }
        .chat-input:focus { outline: none; border-color: rgba(59, 130, 246, 0.3); background: rgba(255, 255, 255, 0.08); }
        .chat-input::placeholder { color: rgba(255, 255, 255, 0.3); }

        .send-button {
            padding: 0.75rem 1.5rem; background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3); color: white;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .send-button:hover { background: rgba(59, 130, 246, 0.25); transform: translateY(-1px); }
        .send-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Empty & Loading */
        .empty-state { text-align: center; padding: 3rem; color: rgba(255, 255, 255, 0.5); }
        .empty-state h3 { color: #fff; margin-bottom: 1rem; }
        .loading-state { text-align: center; padding: 2rem; color: rgba(255, 255, 255, 0.5); }
        .loading-spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.1); border-top: 3px solid #3b82f6;
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .msg-content { padding: 5rem 1rem 2rem; }
            .messages-layout { grid-template-columns: 1fr; height: auto; }
            .conversations-section { height: 300px; }
            .chat-section { height: 400px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="nav">
            <a href="/" class="nav-brand">Talent & Agency</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="/discover">Discover</a></li>
                    <li><a href="/favorites">Favorites</a></li>
                    <li><a href="/messages" class="active">Messages</a></li>
                </ul>
            </nav>
            <div class="nav-actions">
                <div class="profile-icon" onclick="window.location.href='/profile'" title="My Profile">
                    <img id="navAvatarImg" src="" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:none;">
                    <span id="navAvatarFallback">?</span>
                </div>
            </div>
        </div>
    </header>
    
    <div class="msg-content">
        <h1 class="page-title">Messages</h1>
        <p class="subtitle">Your conversations with talents and agencies</p>
        
        <!-- Messages Layout -->
        <div class="messages-layout">
            <!-- Conversations List -->
            <div class="conversations-section">
                <h2 class="msg-section-title">Conversations</h2>
                <div id="conversationsList">
                    <div class="loading-state">
                        <div class="loading-spinner"></div>
                        <p>Loading conversations...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Notification System
        class NotificationSystem {
            constructor() {
                this.notifications = [];
                this.maxNotifications = 5;
            }
            
            show(message, type = 'info', duration = 5000, options = {}) {
                const notification = this.createNotification(message, type, options);
                this.addNotification(notification);
                
                // Auto-remove after duration
                if (duration > 0) {
                    setTimeout(() => {
                        this.removeNotification(notification.id);
                    }, duration);
                }
                
                return notification.id;
            }
            
            createNotification(message, type, options) {
                const id = 'notification_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.id = id;
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    background: linear-gradient(135deg, ${type === 'message' ? '#3b82f6' : type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#6b7280'} 0%, ${type === 'message' ? '#2563eb' : type === 'success' ? '#059669' : type === 'error' ? '#dc2626' : '#4b5563'} 100%);
                    color: white;
                    padding: 1rem 1.5rem;
                    border-radius: 12px;
                    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
                    z-index: 10000;
                    animation: slideIn 0.3s ease;
                    max-width: 350px;
                    border: 1px solid rgba(255, 255, 255, 0.1);
                    backdrop-filter: blur(10px);
                `;
                
                const icons = {
                    info: '💬',
                    success: '✅',
                    error: '❌',
                    warning: '⚠️',
                    message: '📩'
                };
                
                notification.innerHTML = `
                    <button onclick="notificationSystem.removeNotification('${id}')" style="
                        position: absolute;
                        top: 0.5rem;
                        right: 0.5rem;
                        background: rgba(255, 255, 255, 0.2);
                        border: none;
                        color: white;
                        width: 24px;
                        height: 24px;
                        border-radius: 50%;
                        cursor: pointer;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-size: 12px;
                    ">×</button>
                    <div style="font-weight: 600; margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.5rem;">
                        <span>${icons[type] || icons.info}</span>
                        <span>${options.title || (type === 'message' ? 'Nouveau message' : 'Notification')}</span>
                    </div>
                    <div style="font-size: 0.875rem; opacity: 0.9;">${message}</div>
                    ${options.action ? `<button style="margin-top: 0.5rem; background: rgba(255,255,255,0.2); border: none; padding: 0.25rem 0.75rem; border-radius: 4px; color: white; font-size: 0.75rem; cursor: pointer;" onclick="${options.action.onclick}">${options.action.text}</button>` : ''}
                `;
                
                return {
                    id,
                    element: notification,
                    type,
                    message,
                    options
                };
            }
            
            addNotification(notification) {
                // Remove oldest if max reached
                if (this.notifications.length >= this.maxNotifications) {
                    const oldest = this.notifications.shift();
                    if (oldest.element.parentNode) {
                        oldest.element.remove();
                    }
                }
                
                this.notifications.push(notification);
                document.body.appendChild(notification.element);
            }
            
            removeNotification(id) {
                const index = this.notifications.findIndex(n => n.id === id);
                if (index !== -1) {
                    const notification = this.notifications[index];
                    notification.element.style.animation = 'slideOut 0.3s ease';
                    
                    setTimeout(() => {
                        if (notification.element.parentNode) {
                            notification.element.remove();
                        }
                        this.notifications.splice(index, 1);
                    }, 300);
                }
            }
            
            showMessage(senderName, message, conversationId) {
                return this.show(
                    `"${message}"`,
                    'message',
                    8000,
                    {
                        title: `Nouveau message de ${senderName}`,
                        action: {
                            text: 'Voir',
                            onclick: `window.location.href = 'messages.html?conversation=${conversationId}'`
                        }
                    }
                );
            }
            
            showSuccess(message, title = 'Success') {
                return this.show(message, 'success', 4000, { title });
            }
            
            showError(message, title = 'Error') {
                return this.show(message, 'error', 6000, { title });
            }
        }
        
        // Global notification system
        window.notificationSystem = new NotificationSystem();
        
        // Add animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(400px); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(400px); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Styles pour les états de conversations
        const conversationStyles = document.createElement('style');
        conversationStyles.textContent = `
            .loading-state, .empty-state, .error-state {
                text-align: center;
                padding: 3rem 2rem;
                color: var(--text-secondary);
            }
            
            .loading-spinner {
                width: 40px;
                height: 40px;
                border: 3px solid rgba(255, 255, 255, 0.1);
                border-top: 3px solid var(--accent-blue-light);
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin: 0 auto 1rem;
            }
            
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
            
            .loading-state h3, .empty-state h3, .error-state h3 {
                margin: 0 0 0.5rem;
                font-size: 1.1rem;
                font-weight: 600;
            }
            
            .loading-state p, .empty-state p, .error-state p {
                margin: 0;
                font-size: 0.9rem;
                opacity: 0.8;
            }
            
            .error-state {
                color: var(--error, #ef4444);
            }
            
            .unread-indicator {
                background: var(--accent-blue-light);
                color: white;
                border-radius: 50%;
                width: 20px;
                height: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.75rem;
                font-weight: 600;
                margin-left: 0.5rem;
            }
        `;
        document.head.appendChild(conversationStyles);

        // ===== VRAIES FONCTIONS API POUR LA MESSAGERIE =====
        
        // API pour la messagerie
        const messagesAPI = {
            async getConversations() {
                try {
                    const response = await Auth.apiFetch('/api/messages/conversations');
                    if (!response.ok) return [];
                    const data = await response.json();
                    return data.conversations || data.data || [];
                } catch (error) {
                    console.error('Error loading conversations:', error);
                    return [];
                }
            },
            
            async getMessages(conversationId) {
                try {
                    console.log(`📥 Loading messages for conversation ${conversationId}`);
                    
                    // Get real messages from API
                    const response = await Auth.apiFetch('/api/messages');
                    if (!response.ok) return [];
                    
                    const data = await response.json();
                    const allMessages = data.data || [];
                    
                    // Filter messages for this conversation
                    // Note: Pour l'instant, on retourne tous les messages car la structure des conversations est différente
                    return allMessages;
                } catch (error) {
                    console.error('Error loading messages:', error);
                    return [];
                }
            },
            
            async sendMessage(conversationId, content, senderId) {
                try {
                    // Plus de vérification de token pour accès libre
                    console.log(`📤 Envoi de message à conversation ${conversationId}`);
                    
                    // Simuler l'envoi de message
                    const newMessage = {
                        id: Date.now(),
                        senderId: 'me',
                        content: content,
                        timestamp: new Date()
                    };
                    
                    return newMessage;
                } catch (error) {
                    console.error('Error sending message:', error);
                    throw error;
                }
            }
        };

        // Fonctions de l'interface
        async function startConversation(participantId, content) {
            try {
                const response = await Auth.apiFetch('/api/messages/conversations', {
                    method: 'POST',
                    body: JSON.stringify({ participantId, content })
                });
                if (!response.ok) throw new Error('Failed to start conversation');
                const data = await response.json();
                return data.conversation || data.data;
            } catch (error) {
                console.error('Error starting conversation:', error);
                throw error;
            }
        }

        // Global variables
        let currentUserId = null;
        let currentConversationId = null;
        let conversations = [];

        // Load user avatar/initials in header
        async function loadNavAvatar() {
            try {
                const token = Auth.getToken();
                if (!token) return;
                const res = await fetch('/api/user/profile', { headers: { 'Authorization': 'Bearer ' + token } });
                if (!res.ok) return;
                const data = await res.json();
                if (!data.success || !data.data) return;
                const d = data.data;
                const name = d.talent_display_name || d.agency_name || ((d.first_name || '') + ' ' + (d.last_name || '')).trim();
                const initials = name.split(' ').map(n => n[0] || '').join('').toUpperCase() || '?';
                const img = document.getElementById('navAvatarImg');
                const fallback = document.getElementById('navAvatarFallback');
                if (d.avatar_url) {
                    img.src = d.avatar_url;
                    img.style.display = 'block';
                    fallback.style.display = 'none';
                } else {
                    fallback.textContent = initials;
                }
            } catch(e) { console.error('Nav avatar error:', e); }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', async function() {
            loadNavAvatar();
            await initializeUser();
            
            // Check for new conversation from discover
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('new') === 'true') {
                await handleNewConversation();
            }
            
            await loadConversations();
        });
        
        // Initialize user
        async function initializeUser() {
            if (!Auth.isLoggedIn()) {
                window.location.href = '/login';
                return;
            }
            
            try {
                const user = await Auth.verifySession();
                if (!user) {
                    window.location.href = '/login';
                    return;
                }
                currentUserId = user.id;
                console.log('User initialized:', user.email);
            } catch (error) {
                console.error('Error initializing user:', error);
                window.location.href = '/login';
            }
        }
        
        // Handle new conversation from discover
        async function handleNewConversation() {
            const newConvData = sessionStorage.getItem('newConversation');
            if (!newConvData) return;
            
            const { participantId, participantName, message } = JSON.parse(newConvData);
            
            try {
                // Start new conversation via API
                const newConversation = await messagesAPI.startConversation(
                    participantId,
                    message,
                    currentUserId
                );
                
                // Add to conversations list
                conversations.unshift(newConversation);
                
                // Clear sessionStorage
                sessionStorage.removeItem('newConversation');
                
                // Select the new conversation
                await selectConversation(newConversation.id);
                
                showNotification(`Conversation started with ${participantName}`, 'success');
            } catch (error) {
                console.error('❌ Error starting conversation:', error);
                showNotification('Failed to start conversation', 'error');
            }
        }
        
        // Load conversations
        async function loadConversations() {
            const container = document.getElementById('conversationsList');
            
                        
            try {
                // Récupérer tous les messages (envoyés et reçus)
                const response = await fetch('/api/messages', {
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to load messages');
                }
                
                const result = await response.json();
                const messages = result.data || [];
                
                // Grouper les messages par conversation (Alice 22 <-> autre utilisateur)
                const conversationsMap = new Map();
                
                messages.forEach(msg => {
                    // Ignorer les messages où Alice s'envoie des messages à elle-même
                    if (msg.sender_id == 22 && msg.receiver_id == 22) {
                        return;
                    }
                    
                    // Identifier l'autre participant dans la conversation
                    let otherUserId;
                    if (msg.sender_id == 22) {
                        otherUserId = msg.receiver_id;
                    } else if (msg.receiver_id == 22) {
                        otherUserId = msg.sender_id;
                    } else {
                        return; // Ignorer les messages qui ne concernent pas Alice
                    }
                    
                    if (!conversationsMap.has(otherUserId)) {
                        // Utiliser le nom du destinataire si Alice est l'expéditeur, sinon le nom de l'expéditeur
                        let participantName;
                        if (msg.sender_id == 22) {
                            participantName = msg.receiver_first_name || `User ${otherUserId}`;
                        } else {
                            participantName = msg.sender_first_name || `User ${otherUserId}`;
                        }
                        
                        conversationsMap.set(otherUserId, {
                            participantId: otherUserId,
                            participantName: participantName,
                            lastMessage: msg,
                            messages: []
                        });
                    }
                    
                    conversationsMap.get(otherUserId).messages.push(msg);
                });
                
                const conversations = Array.from(conversationsMap.values());
                
                // Vérifier si vide
                if (conversations.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>No conversations</h3>
                            <p>Start chatting with talents and agencies from the Discover page</p>
                        </div>
                    `;
                    return;
                }
                
                // Afficher les conversations
                const conversationsHtml = conversations.map(conv => {
                    return `
                        <div class="conversation" onclick="openChatWithUser(${conv.participantId}, '${conv.participantName}')">
                            <div class="conversation-header">
                                <div class="conversation-name">${conv.participantName}</div>
                                <div class="conversation-time">${formatTimestamp(new Date(conv.lastMessage.created_at))}</div>
                            </div>
                            <div class="conversation-message">${conv.lastMessage.content}</div>
                        </div>
                    `;
                }).join('');
                
                container.innerHTML = conversationsHtml;
                
            } catch (error) {
                console.error('❌ Error loading conversations:', error);
                container.innerHTML = `
                    <div class="error-state">
                        <h3>Loading error</h3>
                        <p>Unable to load conversations</p>
                    </div>
                `;
            }
        }
        
        // Ouvrir le chat avec un utilisateur
        function openChatWithUser(userId, userName) {
            // Ouvrir l'interface de chat directement
            openChatInterface(userId, userName);
        }

        // Interface de chat directe (copiée de discover.html)
        async function openChatInterface(profileId, name) {
            // Ouvrir l'interface de chat directe avec ce profil
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.8);
                z-index: 1000;
                display: flex;
                align-items: center;
                justify-content: center;
                backdrop-filter: blur(10px);
            `;
            
            modal.innerHTML = `
                <div style="
                    width: 90%;
                    max-width: 800px;
                    height: 80vh;
                    max-height: 600px;
                    background: #0a0a0a;
                    border-radius: 1rem;
                    border: 1px solid #2a2a2a;
                    display: flex;
                    flex-direction: column;
                    overflow: hidden;
                ">
                    <!-- Header -->
                    <div style="
                        padding: 1rem 1.5rem;
                        background: #111111;
                        border-bottom: 1px solid #2a2a2a;
                        display: flex;
                        align-items: center;
                        justify-content: space-between;
                    ">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <div style="
                                width: 40px;
                                height: 40px;
                                border-radius: 50%;
                                background: #3b82f6;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                color: white;
                                font-weight: 600;
                            ">${name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase()}</div>
                            <div>
                                <h3 style="margin: 0; font-size: 1rem; font-weight: 600;">${name}</h3>
                                <p style="margin: 0; font-size: 0.85rem; color: #a0a0a0;">Active now</p>
                            </div>
                        </div>
                        <button onclick="closeChatModal()" style="
                            background: none;
                            border: none;
                            color: #a0a0a0;
                            font-size: 1.5rem;
                            cursor: pointer;
                            padding: 0.5rem;
                            border-radius: 0.5rem;
                            transition: all 0.2s;
                        " onmouseover="this.style.background='#1a1a1a'; this.style.color='#ffffff';" 
                           onmouseout="this.style.background='none'; this.style.color='#a0a0a0';">×</button>
                    </div>
                    
                    <!-- Messages Container -->
                    <div id="chatMessages" style="
                        flex: 1;
                        padding: 1.5rem;
                        overflow-y: auto;
                        display: flex;
                        flex-direction: column;
                        gap: 1rem;
                    ">
                        <div style="text-align: center; color: #a0a0a0; padding: 2rem;">
                            <i class="fas fa-comment-dots" style="font-size: 2rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                            <p>Start the conversation with ${name}</p>
                        </div>
                    </div>
                    
                    <!-- Input -->
                    <div style="
                        padding: 1rem 1.5rem;
                        background: #111111;
                        border-top: 1px solid #2a2a2a;
                    ">
                        <div style="display: flex; gap: 0.75rem; align-items: flex-end;">
                            <button style="
                                width: 44px;
                                height: 44px;
                                border-radius: 50%;
                                border: none;
                                background: #1a1a1a;
                                color: #a0a0a0;
                                cursor: pointer;
                                transition: all 0.2s;
                            " onmouseover="this.style.background='#2a2a2a'; this.style.color='#ffffff';" 
                               onmouseout="this.style.background='#1a1a1a'; this.style.color='#a0a0a0';">
                                <i class="fas fa-paperclip"></i>
                            </button>
                            <textarea id="chatInput" style="
                                flex: 1;
                                padding: 0.75rem 1rem;
                                background: #1a1a1a;
                                border: 1px solid #2a2a2a;
                                border-radius: 1.5rem;
                                color: #ffffff;
                                font-size: 0.9rem;
                                resize: none;
                                min-height: 44px;
                                max-height: 120px;
                                font-family: inherit;
                            " placeholder="Type a message..." rows="1"></textarea>
                            <button id="sendChatBtn" onclick="sendChatMessage(${profileId})" style="
                                width: 44px;
                                height: 44px;
                                border-radius: 50%;
                                border: none;
                                background: #3b82f6;
                                color: white;
                                cursor: pointer;
                                transition: all 0.2s;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                            " onmouseover="this.style.background='#60a5fa';" 
                               onmouseout="this.style.background='#3b82f6';">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display: block;">
                                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Setup event listeners
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendChatBtn');
            
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendChatMessage(profileId);
                }
            });
            
            input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
            
            // Focus input
            input.focus();
            
            // Load existing messages
            loadChatMessages(profileId);
        }

        function closeChatModal() {
            const modal = document.querySelector('div[style*="position: fixed"]');
            if (modal) {
                modal.remove();
            }
        }

        async function loadChatMessages(profileId) {
            try {
                const response = await fetch('/api/messages', {
                    headers: { 
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const result = await response.json();
                    const messages = result.data || [];
                    
                    // Filter messages for this conversation (Alice 22 <-> profileId)
                    const conversationMessages = messages.filter(msg => 
                        (msg.sender_id == 22 && msg.receiver_id == profileId) ||
                        (msg.sender_id == profileId && msg.receiver_id == 22)
                    );
                    
                    conversationMessages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                    
                    displayChatMessages(conversationMessages);
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        function displayChatMessages(messages) {
            const container = document.getElementById('chatMessages');
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; color: #a0a0a0; padding: 2rem;">
                        <i class="fas fa-comment-dots" style="font-size: 2rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                        <p>Start the conversation!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = messages.map(msg => {
                const isSent = msg.sender_id == 22; // Alice's ID
                const senderName = msg.sender_first_name || 'Unknown';
                
                return `
                    <div style="
                        display: flex;
                        gap: 0.75rem;
                        max-width: 70%;
                        ${isSent ? 'align-self: flex-end; flex-direction: row-reverse;' : ''}
                        margin-bottom: 1rem;
                    ">
                        <div style="
                            width: 32px;
                            height: 32px;
                            border-radius: 50%;
                            background: #3b82f6;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            font-size: 0.75rem;
                            font-weight: 600;
                            color: white;
                            flex-shrink: 0;
                        ">${senderName[0]?.toUpperCase() || '?'}</div>
                        <div style="display: flex; flex-direction: column; gap: 0.25rem;">
                            <div style="
                                padding: 0.75rem 1rem;
                                border-radius: 1rem;
                                font-size: 0.9rem;
                                line-height: 1.4;
                                word-wrap: break-word;
                                ${isSent ? 
                                    'background: #3b82f6; color: white; border-bottom-right-radius: 0.25rem;' : 
                                    'background: #1a1a1a; border: 1px solid #2a2a2a; border-bottom-left-radius: 0.25rem;'
                                }
                            ">${msg.content}</div>
                            <div style="
                                font-size: 0.7rem;
                                color: #a0a0a0;
                                padding: 0 0.5rem;
                                ${isSent ? 'text-align: right;' : ''}
                            ">${formatChatTime(new Date(msg.created_at))}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Scroll to bottom
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);
        }

        async function sendChatMessage(profileId) {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            
            if (!content) return;
            
            const sendBtn = document.getElementById('sendChatBtn');
            sendBtn.disabled = true;
            
            try {
                const response = await fetch('/api/messages/conversations', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        participantId: profileId, 
                        content: content,
                        senderId: 22 // Alice's ID
                    })
                });
                
                if (response.ok) {
                    // Clear input
                    input.value = '';
                    input.style.height = 'auto';
                    
                    // Add message immediately to UI for instant feedback
                    const container = document.getElementById('chatMessages');
                    const messageHtml = `
                        <div style="
                            display: flex;
                            gap: 0.75rem;
                            max-width: 70%;
                            align-self: flex-end;
                            flex-direction: row-reverse;
                            margin-bottom: 1rem;
                        ">
                            <div style="
                                width: 32px;
                                height: 32px;
                                border-radius: 50%;
                                background: #3b82f6;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                font-size: 0.75rem;
                                font-weight: 600;
                                color: white;
                                flex-shrink: 0;
                            ">A</div>
                            <div style="display: flex; flex-direction: column; gap: 0.25rem;">
                                <div style="
                                    padding: 0.75rem 1rem;
                                    border-radius: 1rem;
                                    font-size: 0.9rem;
                                    line-height: 1.4;
                                    word-wrap: break-word;
                                    background: #3b82f6; color: white; border-bottom-right-radius: 0.25rem;
                                ">${content}</div>
                                <div style="
                                    font-size: 0.7rem;
                                    color: #a0a0a0;
                                    padding: 0 0.5rem;
                                    text-align: right;
                                ">just now</div>
                            </div>
                        </div>
                    `;
                    
                    // Remove empty state if exists
                    if (container.innerHTML.includes('Start the conversation')) {
                        container.innerHTML = '';
                    }
                    
                    // Add new message
                    container.innerHTML += messageHtml;
                    
                    // Scroll to bottom
                    setTimeout(() => {
                        container.scrollTop = container.scrollHeight;
                    }, 100);
                    
                    // Reload conversations after sending to update the list
                    setTimeout(() => {
                        loadConversations();
                    }, 1000);
                } else {
                    const result = await response.json();
                    alert('Error sending message: ' + (result.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Error sending message: ' + error.message);
            } finally {
                sendBtn.disabled = false;
            }
        }

        function formatChatTime(date) {
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return 'just now';
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            if (days < 7) return `${days}d ago`;
            
            return date.toLocaleDateString();
        }
        
        // Render conversations
        function renderConversations() {
            const container = document.getElementById('conversationsList');
            if (!container) return;
            
            if (conversations.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No conversations</h3>
                        <p>Start chatting with talents and agencies</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = conversations.map(conv => `
                <div class="conversation ${conv.id === currentConversationId ? 'active' : ''}" 
                     onclick="selectConversation('${conv.id}')"
                     data-conversation-id="${conv.id}">
                    <div class="conversation-header">
                        <div class="conversation-name">${conv.participant?.firstName || 'Unknown'} ${conv.participant?.lastName || ''}</div>
                        <div style="display: flex; align-items: center;">
                            <div class="conversation-time">${formatTimestamp(new Date(conv.updatedAt))}</div>
                            ${conv.messages?.some(m => !m.isRead && m.senderId !== currentUserId) ? '<div class="unread-indicator"></div>' : ''}
                        </div>
                    </div>
                    <div class="conversation-message">${conv.messages?.[conv.messages.length - 1]?.content || 'No messages'}</div>
                </div>
            `).join('');
        }

        // Select conversation
        async function selectConversation(conversationId) {
            currentConversationId = conversationId;
            
            // Update active state
            document.querySelectorAll('.conversation').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelector(`[data-conversation-id="${conversationId}"]`)?.classList.add('active');
            
            // Load messages
            await loadMessages(conversationId);
        }

        // Load messages
        async function loadMessages(conversationId) {
            try {
                const messages = await messagesAPI.getMessages(conversationId);
                renderMessages(messages);
            } catch (error) {
                console.error('❌ Error loading messages:', error);
                showNotification('Failed to load messages', 'error');
            }
        }
        
        // Render messages
        function renderMessages(messages) {
            const container = document.getElementById('chatContent');
            if (!container) return;
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>No messages yet. Start the conversation!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.senderId === currentUserId ? 'sent' : 'received'}">
                    <div class="message-content">${msg.content}</div>
                    <div class="message-time">${formatTimestamp(new Date(msg.createdAt))}</div>
                </div>
            `).join('');
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }
        
        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            const content = input.value.trim();
            
            if (!content || !currentConversationId) return;
            
            // Disable send button
            sendButton.disabled = true;
            sendButton.textContent = 'Sending...';
            
            try {
                // Send message via API
                await messagesAPI.sendMessage(currentConversationId, content, currentUserId);
                
                // Clear input
                input.value = '';
                
                // Reload messages
                await loadMessages(currentConversationId);
                
                // Update conversation list
                await loadConversations();
                
            } catch (error) {
                console.error('❌ Error sending message:', error);
                showNotification('Error sending message', 'error');
            } finally {
                // Re-enable send button
                sendButton.disabled = false;
                sendButton.textContent = 'Send';
            }
        }
        
        // Simulate incoming message (for demo)
        function simulateIncomingMessage() {
            if (!currentConversationId) return;
            
            const conversation = conversations.find(c => c.id === currentConversationId);
            if (!conversation) return;
            
            const responses = [
                'Thank you for your message!',
                'I am interested in your profile.',
                'Can you give me more details?',
                'When are you available for a call?',
                'Your skills perfectly match what we are looking for.'
            ];
            
            const randomResponse = responses[Math.floor(Math.random() * responses.length)];
            
            // Add incoming message to API
            const incomingMessage = {
                id: 'msg_' + Date.now(),
                conversation_id: currentConversationId,
                sender_id: conversation.participant_id,
                content: randomResponse,
                timestamp: new Date().toISOString(),
                is_from_me: false
            };
            
            // Store message
            if (!window.messagesAPI.messages.has(currentConversationId)) {
                window.messagesAPI.messages.set(currentConversationId, []);
            }
            window.messagesAPI.messages.get(currentConversationId).push(incomingMessage);
            
            // Show notification
            window.notificationSystem.showMessage(
                conversation.participant_name,
                randomResponse,
                currentConversationId
            );
            
            // Reload messages if user is in this conversation
            if (currentConversationId === conversation.id) {
                loadMessages(currentConversationId);
            }
            
            // Update conversation list
            loadConversations();
        }

        // Format timestamp
        function formatTimestamp(date) {
            const now = new Date();
            const diff = now - date;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (seconds < 60) {
                return 'Just now';
            } else if (minutes < 60) {
                return `${minutes} minute${minutes > 1 ? 's' : ''} ago`;
            } else if (hours < 24) {
                return `${hours} hour${hours > 1 ? 's' : ''} ago`;
            } else if (days < 7) {
                return `${days} day${days > 1 ? 's' : ''} ago`;
            } else {
                return date.toLocaleDateString('en-US', {
                    day: 'numeric',
                    month: 'short',
                    year: date.getFullYear() !== now.getFullYear() ? 'numeric' : undefined
                });
            }
        }

        // Render empty state
        function renderEmptyState() {
            const container = document.getElementById('conversationsList');
            container.innerHTML = `
                <div class="empty-state">
                    <h3>No conversations</h3>
                    <p>Start chatting with talents and agencies</p>
                </div>
            `;
        }

        // Render chat error
        function renderChatError() {
            const chatContent = document.getElementById('chatContent');
            chatContent.innerHTML = `
                <div class="empty-state">
                    <h3>Loading error</h3>
                    <p>Unable to load messages for this conversation</p>
                </div>
            `;
        }

        // Check authentication - DÉSACTIVÉ pour accès libre
        async function checkAuth() {
            try {
                // Plus de vérification d'authentification - accès libre
                console.log('✅ Accès libre à la page messages');
                return true;
                
            } catch (error) {
                console.error('Error checking auth:', error);
                return true; // Toujours autoriser l'accès
            }
        }

        console.log('🚀 Messages page loaded with real messaging system');
        
        // Initialize everything when page loads
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadConversations();
        });
    </script>
</body>
</html>
