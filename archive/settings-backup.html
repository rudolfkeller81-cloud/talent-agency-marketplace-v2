<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Talent & Agency</title>
    <script src="../config.js"></script>
    <script src="../supabase-client.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            backdrop-filter: blur(10px);
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .card-description {
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .card-content {
            padding: 1.5rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .card-footer {
            padding: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .section-title {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            font-size: 0.875rem;
        }

        .input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 0.875rem;
            transition: all 0.3s;
        }

        .input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }

        .input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .grid {
            display: grid;
            gap: 1rem;
        }

        .grid-2 {
            grid-template-columns: 1fr 1fr;
        }

        .back-link {
            position: absolute;
            top: 1rem;
            left: 1rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s;
            font-size: 0.875rem;
        }

        .back-link:hover {
            color: #fff;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.875rem;
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            width: auto;
            margin: 0;
            accent-color: #3b82f6;
        }

        .checkbox-label span {
            user-select: none;
        }

        textarea.input {
            min-height: 80px;
            font-family: inherit;
            resize: vertical;
        }
    </style>
</head>
<body>
    <a href="../discover.html" class="back-link">← Back to Discover</a>
    
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">Profile Settings</h2>
            <p class="card-description">
                Update your profile information and photo
            </p>
        </div>
        
        <div class="card-content">
            <div id="error-message" class="status-message error-message"></div>
            <div id="success-message" class="status-message success-message"></div>
            
            <form id="settings-form">
                <!-- Basic Information -->
                <div class="section-title">Basic Information</div>
                
                <div class="form-group">
                    <div class="grid grid-2">
                        <div>
                            <label for="firstName" class="label">First Name</label>
                            <input
                                id="firstName"
                                type="text"
                                class="input"
                                placeholder="Enter your first name"
                                required
                            />
                        </div>
                        <div>
                            <label for="lastName" class="label">Last Name</label>
                            <input
                                id="lastName"
                                type="text"
                                class="input"
                                placeholder="Enter your last name"
                                required
                            />
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email" class="label">Email</label>
                    <input
                        id="email"
                        type="email"
                        class="input"
                        placeholder="your.email@example.com"
                        required
                        readonly
                    />
                </div>

                <!-- Profile Type -->
                <div class="form-group">
                    <label class="label">Profile Type</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="radio" name="profileType" value="talent" id="talent-radio">
                            <span>Talent</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="radio" name="profileType" value="agency" id="agency-radio">
                            <span>Agency</span>
                        </label>
                    </div>
                </div>
            </form>
        </div>
        
        <div class="card-footer">
            <button type="submit" form="settings-form" class="btn btn-primary">
                Save Changes
            </button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='../discover.html'">
                Cancel
            </button>
            <button type="button" class="btn btn-danger" onclick="logout()">
                Logout
            </button>
        </div>
    </div>

    <script>
        // Simple navigation function
        function logout() {
            localStorage.clear();
            window.location.href = '../index.html';
        }

        // Form submission
        document.getElementById('settings-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Settings saved successfully!');
        });
    </script>
</body>
</html>
