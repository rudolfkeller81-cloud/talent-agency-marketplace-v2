<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Profile - Talent & Agency</title>
    <script src="/auth-utils.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            color: #fff;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
        }

        .back-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s;
            font-size: 0.875rem;
        }

        .back-link:hover {
            color: #fff;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Profile Layout */
        .profile-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        /* Profile Card */
        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .profile-avatar-placeholder {
            font-size: 3rem;
            color: #fff;
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .profile-role {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 1rem;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            padding: 1rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin: 1rem 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
        }

        .stat-label {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Profile Content */
        .profile-content {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
        }

        .content-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-button {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.875rem;
            border-bottom: 2px solid transparent;
        }

        .tab-button:hover {
            color: #fff;
        }

        .tab-button.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            font-size: 0.875rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 0.875rem;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-textarea {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 0.875rem;
            transition: all 0.3s;
            resize: vertical;
            min-height: 120px;
        }

        .form-textarea:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }

        .form-select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 0.875rem;
            transition: all 0.3s;
        }

        .form-select:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }

        .form-select option {
            background: #1a1a1a;
            color: #fff;
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-outline {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* File Upload */
        .file-upload {
            position: relative;
            display: inline-block;
            cursor: pointer;
            width: 100%;
        }

        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s;
        }

        .file-upload:hover .file-upload-label {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
        }

        /* Media Grid */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .media-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            aspect-ratio: 1;
        }

        .media-item img,
        .media-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .media-item:hover .media-overlay {
            opacity: 1;
        }

        .media-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* Media Preview */
        .media-preview {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
        }

        .media-preview img,
        .media-preview video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        .media-preview .remove-media {
            margin-top: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .media-preview .remove-media:hover {
            background: rgba(239, 68, 68, 0.3);
            border-color: rgba(239, 68, 68, 0.5);
        }

        /* Posts Display */
        .post-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .post-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .post-type {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .post-type.text { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .post-type.photo { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .post-type.video { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .post-type.mixed { background: rgba(168, 85, 247, 0.2); color: #a855f7; }

        .post-content {
            margin-bottom: 1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        .post-media {
            margin-bottom: 1rem;
        }

        .post-media img,
        .post-media video {
            max-width: 100%;
            border-radius: 8px;
        }

        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .post-actions {
            display: flex;
            gap: 1rem;
        }

        .post-action {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .post-action:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .post-action.delete:hover {
            color: #ef4444;
        }

        /* Status Message */
        .status-message {
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .profile-layout {
                grid-template-columns: 1fr;
            }

            .profile-card {
                position: static;
                margin-bottom: 1rem;
            }

            .content-tabs {
                overflow-x: auto;
                padding-bottom: 0.5rem;
            }

            .tab-button {
                white-space: nowrap;
            }

            .media-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/discover" class="back-link">← Back to Discover</a>
            <h1 class="header-title">Profile</h1>
            <div></div>
        </div>
    </header>

    <div class="container">
        <div class="profile-layout">
            <!-- Profile Card -->
            <aside class="profile-card">
                <div class="profile-avatar" id="profile-avatar">
                    <div class="profile-avatar-placeholder">👤</div>
                </div>
                <h2 class="profile-name" id="profile-name">Loading...</h2>
                <p class="profile-role" id="profile-role">Talent</p>
                
                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="posts-count">0</div>
                        <div class="stat-label">Posts</div>
                    </div>
                </div>

                <button class="btn btn-primary" style="width: 100%;" onclick="saveProfile()">Save Profile</button>
            </aside>

            <!-- Profile Content -->
            <main class="profile-content">
                <div id="status-message" class="status-message"></div>

                <!-- Content Tabs -->
                <div class="content-tabs">
                    <button class="tab-button active" onclick="switchTab('edit')">Edit Profile</button>
                    <button class="tab-button" onclick="switchTab('media')">Publish New Post</button>
                    <button class="tab-button" onclick="switchTab('posts')">Posts</button>
                </div>

                <!-- Edit Profile Tab -->
                <div id="edit-tab" class="tab-content active">
                    <h3 style="margin-bottom: 1.5rem; color: #fff;">Edit Profile Information</h3>
                    
                    <!-- Basic Info -->
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-input" id="first-name" placeholder="First name">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-input" id="last-name" placeholder="Last name">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="email" placeholder="your.email@example.com" readonly style="opacity:0.6;cursor:not-allowed;">
                    </div>

                    <!-- Talent-specific fields -->
                    <div id="talent-fields" style="display:none;">
                        <h4 style="margin: 2rem 0 1rem; color: rgba(255,255,255,0.7); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em;">Talent Information</h4>

                        <div class="form-group">
                            <label class="form-label">Stage Name / Display Name</label>
                            <input type="text" class="form-input" id="display-name" placeholder="Your stage name">
                        </div>

                        <div class="form-group">
                            <label class="form-label">What type of talent are you?</label>
                            <select class="form-input" id="talent-type" style="background:rgba(255,255,255,0.05);color:#fff;">
                                <option value="">Select your talent type</option>
                                <option value="actor">Actor</option>
                                <option value="model">Model</option>
                                <option value="musician">Musician</option>
                                <option value="dancer">Dancer</option>
                                <option value="photographer">Photographer</option>
                                <option value="videographer">Videographer</option>
                                <option value="content-creator">Content Creator</option>
                                <option value="influencer">Influencer</option>
                                <option value="artist">Artist</option>
                                <option value="writer">Writer</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Years of Experience</label>
                            <select class="form-input" id="experience" style="background:rgba(255,255,255,0.05);color:#fff;">
                                <option value="">Select experience level</option>
                                <option value="beginner">Beginner (0-2 years)</option>
                                <option value="intermediate">Intermediate (2-5 years)</option>
                                <option value="experienced">Experienced (5-10 years)</option>
                                <option value="expert">Expert (10+ years)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Portfolio/Website URL (optional)</label>
                            <input type="url" class="form-input" id="portfolio" placeholder="https://yourportfolio.com">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Age</label>
                            <input type="number" class="form-input" id="age" placeholder="25" min="18" max="100">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Country</label>
                            <select class="form-input" id="country" style="background:rgba(255,255,255,0.05);color:#fff;">
                                <option value="">Select your country</option>
                                <option value="US">United States</option>
                                <option value="UK">United Kingdom</option>
                                <option value="CA">Canada</option>
                                <option value="AU">Australia</option>
                                <option value="FR">France</option>
                                <option value="DE">Germany</option>
                                <option value="IT">Italy</option>
                                <option value="ES">Spain</option>
                                <option value="NL">Netherlands</option>
                                <option value="BR">Brazil</option>
                                <option value="MX">Mexico</option>
                                <option value="JP">Japan</option>
                                <option value="KR">South Korea</option>
                                <option value="IN">India</option>
                                <option value="OTHER">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Languages you speak</label>
                            <textarea class="form-textarea" id="languages" placeholder="List the languages you speak (e.g., English, French, Spanish, Italian...)"></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Platforms</label>
                            <div style="display:flex;flex-wrap:wrap;gap:0.75rem;">
                                <label style="display:flex;align-items:center;gap:0.4rem;color:rgba(255,255,255,0.8);font-size:0.9rem;cursor:pointer;">
                                    <input type="checkbox" name="platforms" value="onlyfans">
                                    OnlyFans
                                </label>
                                <label style="display:flex;align-items:center;gap:0.4rem;color:rgba(255,255,255,0.8);font-size:0.9rem;cursor:pointer;">
                                    <input type="checkbox" name="platforms" value="fansly">
                                    Fansly
                                </label>
                                <label style="display:flex;align-items:center;gap:0.4rem;color:rgba(255,255,255,0.8);font-size:0.9rem;cursor:pointer;">
                                    <input type="checkbox" name="platforms" value="admireme">
                                    AdmireMe
                                </label>
                                <label style="display:flex;align-items:center;gap:0.4rem;color:rgba(255,255,255,0.8);font-size:0.9rem;cursor:pointer;">
                                    <input type="checkbox" name="platforms" value="other">
                                    Other
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Social Media Networks</label>
                            <div style="display: grid; gap: 1rem;">
                                <input type="text" class="form-input" id="instagram" placeholder="Instagram username">
                                <input type="text" class="form-input" id="twitter" placeholder="Twitter username">
                                <input type="text" class="form-input" id="tiktok" placeholder="TikTok username">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Monthly Revenue ($)</label>
                            <select class="form-input" id="monthly-revenue" style="background:rgba(255,255,255,0.05);color:#fff;">
                                <option value="">Select revenue range</option>
                                <option value="less-10k">Less than $10,000</option>
                                <option value="10k-25k">$10,000 - $25,000</option>
                                <option value="25k-50k">$25,000 - $50,000</option>
                                <option value="50k-100k">$50,000 - $100,000</option>
                                <option value="100k-250k">$100,000 - $250,000</option>
                                <option value="250k-500k">$250,000 - $500,000</option>
                                <option value="500k+">More than $500,000</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Do you currently have a manager?</label>
                            <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                                <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer; padding: 0.5rem;">
                                    <input type="radio" name="has-manager" value="yes">
                                    <span>Yes</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer; padding: 0.5rem;">
                                    <input type="radio" name="has-manager" value="no">
                                    <span>No</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Bio / Description</label>
                            <textarea class="form-textarea" id="bio" placeholder="Tell us about yourself..."></textarea>
                        </div>
                    </div>

                    <!-- Agency-specific fields -->
                    <div id="agency-fields" style="display:none;">
                        <h4 style="margin: 2rem 0 1rem; color: rgba(255,255,255,0.7); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em;">Agency Information</h4>

                        <div class="form-group">
                            <label class="form-label">Agency Name</label>
                            <input type="text" class="form-input" id="agency-name" placeholder="Your agency name">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Agency Type</label>
                            <select class="form-input" id="agency-type" style="background:rgba(255,255,255,0.05);color:#fff;">
                                <option value="">Select agency type</option>
                                <option value="talent-agency">Talent Agency</option>
                                <option value="modeling-agency">Modeling Agency</option>
                                <option value="digital-agency">Digital Agency</option>
                                <option value="management-agency">Management Agency</option>
                                <option value="production-company">Production Company</option>
                                <option value="pr-agency">PR Agency</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Platforms you manage</label>
                            <div style="display:flex;flex-wrap:wrap;gap:0.75rem;">

        // Fonction de réparation automatique
        function repairPostsDisplay() {
            try {
                const data = localStorage.getItem('userProfile');
                if (!data) {
                    console.log('❌ Pas de données à réparer');
                    return;
                }
                
                const profile = JSON.parse(data);
                const posts = profile.posts || [];
                
                if (posts.length === 0) {
                    console.log('❌ Aucun post à réparer');
                    return;
                }
                
                console.log('🔧 Réparation de l\'affichage des posts...');
                
                // Forcer la mise à jour de profileData global
                window.profileData = profile;
                
                // Reconstruire manuellement le HTML
                const postsList = document.getElementById('posts-list');
                if (!postsList) {
                    console.log('❌ Élément posts-list non trouvé');
                    return;
                }
                
                let postsHtml = '';
                posts.forEach(post => {
                    const typeClass = post.type || 'text';
                    const typeName = {
                        'text': '📄 Text',
                        'photo': '📷 Photo', 
                        'video': '🎥 Video',
                        'mixed': '🎨 Mixed'
                    }[typeClass] || '📄 Text';
                    
                    const date = new Date(post.createdAt).toLocaleDateString('fr-FR', {
                        day: 'numeric',
                        month: 'short',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    
                    postsHtml += `
                        <div class="post-item">
                            <div class="post-header">
                                <span class="post-type ${typeClass}">${typeName}</span>
                                <span style="color: rgba(255,255,255,0.5); font-size: 0.8rem;">${date}</span>
                            </div>
                            
                            ${post.content ? `<div class="post-content">${post.content}</div>` : ''}
                            
                            ${post.media ? `
                                <div class="post-media">
                                    ${post.media.type === 'image' 
                                        ? `<img src="${post.media.url}" alt="${post.media.name}" style="max-width: 100%; border-radius: 8px; display: block;">`
                                        : `<video src="${post.media.url}" controls style="max-width: 100%; border-radius: 8px;"></video>`
                                    }
                                </div>
                            ` : ''}
                            
                            <div class="post-footer">
                                <div class="post-actions">
                                    <button class="post-action">❤️ ${post.likes || 0}</button>
                                    <button class="post-action">💬 ${post.comments || 0}</button>
                                    <button class="post-action">🔄 ${post.shares || 0}</button>
                                </div>
                                <button class="post-action delete" onclick="deletePost(${post.id})">🗑️ Delete</button>
                            </div>
                        </div>
                    `;
                });
                
                // Insérer directement le HTML
                postsList.innerHTML = postsHtml;
                
                console.log('✅ Réparation terminée!');
                console.log('📏 HTML inséré:', postsHtml.length, 'caractères');
                console.log('🖼️ Images dans le HTML:', postsHtml.includes('<img'));
                
                // Vérifier les images après réparation
                setTimeout(() => {
                    const images = postsList.querySelectorAll('img');
                    console.log('🖼️ Images après réparation:', images.length);
                    images.forEach((img, index) => {
                        console.log(`  Image ${index + 1}:`, {
                            src: img.src.substring(0, 50) + '...',
                            loaded: img.complete,
                            visible: img.offsetWidth > 0 && img.offsetHeight > 0,
                            display: window.getComputedStyle(img).display
                        });
                    });
                }, 100);
                
            } catch (error) {
                console.error('❌ Erreur lors de la réparation:', error);
            }
        }

        // Créer un post de test automatiquement
        function createTestPost() {
            const testPost = {

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');

        // Load profile from API
        async function loadProfile() {
            try {
                const token = Auth.getToken();
                if (!token) {
                    // Pas de token = mode démo automatique
                    console.log('No token found, using demo mode');
                    loadDemoProfile();
                    return;
                }

                const response = await fetch('/api/user/profile', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                const text = await response.text();
                let result;
                try { result = JSON.parse(text); } catch(e) {
                    throw new Error('Invalid server response');
                }

                if (!result.success) {
                    throw new Error(result.error || 'Load failed');
                }

                const d = result.data;
                profileData = d;
                userRole = d.role || 'talent';

                // Basic fields
                document.getElementById('first-name').value = d.first_name || '';
                document.getElementById('last-name').value = d.last_name || '';
                document.getElementById('email').value = d.email || '';

                const displayName = d.talent_display_name || d.agency_name || ((d.first_name || '') + ' ' + (d.last_name || '')).trim();
                document.getElementById('profile-name').textContent = displayName;
                document.getElementById('profile-role').textContent = userRole.charAt(0).toUpperCase() + userRole.slice(1);

                // Avatar
                if (d.avatar_url) {
                    document.getElementById('profile-avatar').innerHTML = `<img src="${d.avatar_url}" alt="Profile" style="width:100%;height:100%;object-fit:cover;">`;
                }

                // Show role-specific fields
                if (userRole === 'talent') {
                    document.getElementById('talent-fields').style.display = 'block';
                    document.getElementById('agency-fields').style.display = 'none';

                    document.getElementById('display-name').value = d.talent_display_name || '';
                    document.getElementById('talent-type').value = d.talent_type || '';
                    document.getElementById('experience').value = d.experience || '';
                    document.getElementById('portfolio').value = d.portfolio || '';
                    document.getElementById('age').value = d.age || '';
                    document.getElementById('country').value = d.talent_country || '';
                    document.getElementById('languages').value = d.languages || '';
                    document.getElementById('instagram').value = d.instagram || '';
                    document.getElementById('twitter').value = d.twitter || '';
                    document.getElementById('tiktok').value = d.tiktok || '';
                    document.getElementById('monthly-revenue').value = d.talent_revenue || d.revenue || '';
                    document.getElementById('has-manager').value = d.has_manager || 'no';
                    document.getElementById('bio').value = d.talent_bio || '';

                    // Check platforms
                    const platforms = (d.talent_platforms || '').split(',').map(p => p.trim());
                    document.querySelectorAll('input[name="platforms"]').forEach(cb => {
                        cb.checked = platforms.includes(cb.value);
                    });
                } else if (userRole === 'agency') {
                    document.getElementById('talent-fields').style.display = 'none';
                    document.getElementById('agency-fields').style.display = 'block';

                    document.getElementById('agency-name').value = d.agency_name || '';
                    document.getElementById('agency-type').value = d.agency_type || '';
                    document.getElementById('talent-count').value = d.talent_count || '';
                    document.getElementById('agency-monthly-revenue').value = d.agency_revenue || '';
                    document.getElementById('total-revenue').value = d.total_revenue || '';
                    document.getElementById('agency-country').value = d.agency_country || d.talent_country || '';
                    document.getElementById('agency-description').value = d.agency_description || '';

                    // Check platforms
                    const platforms = (d.agency_platforms || '').split(',').map(p => p.trim());
                    document.querySelectorAll('input[name="agency-platforms"]').forEach(cb => {
                        cb.checked = platforms.includes(cb.value);
                    });
                }

            } catch (error) {
                console.error('Error loading profile:', error);
                
                // Fallback to localStorage data
                try {
                    const localProfile = localStorage.getItem('userProfile');
                    if (localProfile) {
                        profileData = JSON.parse(localProfile);
                        userRole = profileData.role || 'talent';
                        
                        // Load basic fields
                        document.getElementById('first-name').value = profileData.first_name || '';
                        document.getElementById('last-name').value = profileData.last_name || '';
                        document.getElementById('email').value = profileData.email || '';
                        
                        const displayName = profileData.displayName || ((profileData.first_name || '') + ' ' + (profileData.last_name || '')).trim();
                        document.getElementById('profile-name').textContent = displayName;
                        document.getElementById('profile-role').textContent = userRole.charAt(0).toUpperCase() + userRole.slice(1);
                        
                        // Load posts
                        if (profileData.posts) {
                            document.getElementById('posts-count').textContent = profileData.posts.length;
                            loadPosts();
                        }
                        
                        showStatus('Profile loaded from local storage', 'success');
                    } else {
                        // Create default profile data
                        profileData = {
                            first_name: 'John',
                            last_name: 'Doe',
                            email: 'john.doe@example.com',
                            role: 'talent',
                            posts: [],
                            media: []
                        };
                        userRole = 'talent';
                        
                        document.getElementById('first-name').value = profileData.first_name;
                        document.getElementById('last-name').value = profileData.last_name;
                        document.getElementById('email').value = profileData.email;
                        document.getElementById('profile-name').textContent = profileData.first_name + ' ' + profileData.last_name;
                        document.getElementById('profile-role').textContent = 'Talent';
                        
                        showStatus('Using demo profile data', 'success');
                    }
                } catch (localError) {
                    console.error('Error loading local profile:', localError);
                    showStatus('Using demo mode - some features may be limited', 'error');
                }
            }
        }

        // Save profile to API
        async function saveProfile() {
            try {
                const token = Auth.getToken();

                const body = {
                    firstName: document.getElementById('first-name').value,
                    lastName: document.getElementById('last-name').value
                };

                if (userRole === 'talent') {
                    body.displayName = document.getElementById('display-name').value;
                    body.talentType = document.getElementById('talent-type').value;
                    body.experience = document.getElementById('experience').value;
                    body.portfolio = document.getElementById('portfolio').value;
                    body.age = document.getElementById('age').value;
                    body.country = document.getElementById('country').value;
                    body.languages = document.getElementById('languages').value;
                    body.instagram = document.getElementById('instagram').value;
                    body.twitter = document.getElementById('twitter').value;
                    body.tiktok = document.getElementById('tiktok').value;
                    body.platforms = Array.from(document.querySelectorAll('input[name="platforms"]:checked')).map(cb => cb.value).join(', ');
                    body.revenue = document.getElementById('monthly-revenue').value;
                    body.hasManager = document.getElementById('has-manager').value;
                    body.bio = document.getElementById('bio').value;
                } else if (userRole === 'agency') {
                    body.agencyName = document.getElementById('agency-name').value;
                    body.agencyType = document.getElementById('agency-type').value;
                    body.platforms = Array.from(document.querySelectorAll('input[name="agency-platforms"]:checked')).map(cb => cb.value).join(', ');
                    body.talentCount = document.getElementById('talent-count').value;
                    body.revenue = document.getElementById('agency-monthly-revenue').value;
                    body.totalRevenue = document.getElementById('total-revenue').value;
                    body.country = document.getElementById('agency-country').value;
                    body.description = document.getElementById('agency-description').value;
                }

                const response = await fetch('/api/user/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(body)
                });

                const text = await response.text();
                let result;
                try { result = JSON.parse(text); } catch(e) {
                    throw new Error('Invalid server response');
                }

                if (!result.success) {
                    throw new Error(result.error || 'Save failed');
                }

                // Update sidebar name
                const newName = (userRole === 'talent')
                    ? (document.getElementById('display-name').value || document.getElementById('first-name').value)
                    : (document.getElementById('agency-name').value || document.getElementById('first-name').value);
                document.getElementById('profile-name').textContent = newName;
                document.getElementById('profile-role').textContent = userRole.charAt(0).toUpperCase() + userRole.slice(1);

                showStatus('Profile saved successfully!', 'success');
            } catch (error) {
                console.error('Error saving profile to API:', error);
                
                // Fallback to localStorage
                try {
                    const formData = {
                        first_name: document.getElementById('first-name').value,
                        last_name: document.getElementById('last-name').value,
                        email: document.getElementById('email').value,
                        role: userRole
                    };
                    
                    if (userRole === 'talent') {
                        formData.displayName = document.getElementById('display-name').value;
                        formData.talentType = document.getElementById('talent-type').value;
                        formData.experience = document.getElementById('experience').value;
                        formData.portfolio = document.getElementById('portfolio').value;
                        formData.age = document.getElementById('age').value;
                        formData.country = document.getElementById('country').value;
                        formData.languages = document.getElementById('languages').value;
                        formData.instagram = document.getElementById('instagram').value;
                        formData.twitter = document.getElementById('twitter').value;
                        formData.tiktok = document.getElementById('tiktok').value;
                        formData.platforms = Array.from(document.querySelectorAll('input[name="platforms"]:checked')).map(cb => cb.value).join(', ');
                        formData.revenue = document.getElementById('monthly-revenue').value;
                        formData.hasManager = document.getElementById('has-manager').value;
                        formData.bio = document.getElementById('bio').value;
                    } else if (userRole === 'agency') {
                        formData.agencyName = document.getElementById('agency-name').value;
                        formData.agencyType = document.getElementById('agency-type').value;
                        formData.platforms = Array.from(document.querySelectorAll('input[name="agency-platforms"]:checked')).map(cb => cb.value).join(', ');
                        formData.talentCount = document.getElementById('talent-count').value;
                        formData.revenue = document.getElementById('agency-monthly-revenue').value;
                        formData.totalRevenue = document.getElementById('total-revenue').value;
                        formData.country = document.getElementById('agency-country').value;
                        formData.description = document.getElementById('agency-description').value;
                    }
                    
                    // Update profileData
                    Object.assign(profileData, formData);
                    
                    // Save to localStorage
                    localStorage.setItem('userProfile', JSON.stringify(profileData));
                    
                    // Update sidebar name
                    const newName = (userRole === 'talent')
                        ? (document.getElementById('display-name').value || document.getElementById('first-name').value)
                        : (document.getElementById('agency-name').value || document.getElementById('first-name').value);
                    document.getElementById('profile-name').textContent = newName;
                    document.getElementById('profile-role').textContent = userRole.charAt(0).toUpperCase() + userRole.slice(1);
                    
                    showStatus('Profile saved locally (demo mode)', 'success');
                } catch (localError) {
                    console.error('Error saving profile locally:', localError);
                    showStatus('Error: ' + error.message, 'error');
                }
            }
        }

        function handleProfilePicture(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    profileData.profilePicture = e.target.result;
                    document.getElementById('profile-avatar').innerHTML = `<img src="${e.target.result}" alt="Profile">`;
                    showStatus('Profile picture updated!', 'success');
                };
                reader.readAsDataURL(file);
            }
        }

        // Media functions
        function handleMediaUpload(event) {
            const files = event.target.files;
            
            // Initialize media array if it doesn't exist
            if (!profileData.media) {
                profileData.media = [];
            }
            
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const mediaItem = {
                        id: Date.now() + Math.random(),
                        type: file.type.startsWith('image/') ? 'image' : 'video',
                        url: e.target.result,
                        name: file.name
                    };
                    profileData.media.push(mediaItem);
                    addMediaToGrid(mediaItem);
                    
                    // Save to localStorage
                    localStorage.setItem('userProfile', JSON.stringify(profileData));
                };
                reader.readAsDataURL(file);
            }
            showStatus('Media uploaded successfully!', 'success');
        }

        function loadMedia() {
            const mediaGrid = document.getElementById('media-grid');
            mediaGrid.innerHTML = '';
            
            if (profileData.media && Array.isArray(profileData.media)) {
                profileData.media.forEach(mediaItem => {
                    addMediaToGrid(mediaItem);
                });
            }
        }

        function addMediaToGrid(mediaItem) {
            const mediaGrid = document.getElementById('media-grid');
            const mediaElement = document.createElement('div');
            mediaElement.className = 'media-item';
            mediaElement.innerHTML = `
                ${mediaItem.type === 'image' ? 
                    `<img src="${mediaItem.url}" alt="${mediaItem.name}">` :
                    `<video src="${mediaItem.url}" controls></video>`
                }
                <div class="media-overlay">
                    <div class="media-actions">
                        <button class="btn btn-outline" onclick="deleteMedia('${mediaItem.id}')">🗑️</button>
                    </div>
                </div>
            `;
            mediaGrid.appendChild(mediaElement);
        }

        function deleteMedia(mediaId) {
            if (profileData.media && Array.isArray(profileData.media)) {
                profileData.media = profileData.media.filter(item => item.id != mediaId);
                localStorage.setItem('userProfile', JSON.stringify(profileData));
            }
            loadMedia();
            showStatus('Media deleted', 'success');
        }

        // Posts functions
        function handlePostMedia(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Store media reference for the post
                    window.currentPostMedia = e.target.result;
                    showStatus('Media added to post', 'success');
                };
                reader.readAsDataURL(file);
            }
        }

        function createPost() {
            const content = document.getElementById('post-content').value;
            if (!content.trim()) {
                showStatus('Please enter post content', 'error');
                return;
            }
            
            const post = {
                id: Date.now(),
                content: content,
                media: window.currentPostMedia || null,
                timestamp: new Date().toISOString(),
                likes: 0,
                comments: []
            };
            
            profileData.posts.unshift(post);
            localStorage.setItem('userProfile', JSON.stringify(profileData));
            
            // Clear form
            document.getElementById('post-content').value = '';
            window.currentPostMedia = null;
            document.getElementById('post-media').value = '';
            
            // Update posts count
            document.getElementById('posts-count').textContent = profileData.posts.length;
            
            loadPosts();
            showStatus('Post published successfully!', 'success');
        }

        function loadPosts() {
            const posts = profileData.posts || [];
            displayPosts(posts);
        }

        
        function deletePost(postId) {
            profileData.posts = profileData.posts.filter(post => post.id != postId);
            localStorage.setItem('userProfile', JSON.stringify(profileData));
            document.getElementById('posts-count').textContent = profileData.posts.length;
            loadPosts();
            showStatus('Post deleted', 'success');
        }

        // New Post Functions
        function handleNewPostMedia(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                const preview = document.getElementById('new-post-media-preview');
                
                reader.onload = function(e) {
                    let mediaHtml = '';
                    if (file.type.startsWith('image/')) {
                        mediaHtml = `<img src="${e.target.result}" alt="Preview">`;
                    } else if (file.type.startsWith('video/')) {
                        mediaHtml = `<video src="${e.target.result}" controls></video>`;
                    }
                    
                    mediaHtml += `<button class="remove-media" onclick="removeNewPostMedia()">❌ Remove Media</button>`;
                    preview.innerHTML = mediaHtml;
                    preview.style.display = 'block';
                };
                
                reader.readAsDataURL(file);
            }
        }

        function removeNewPostMedia() {
            document.getElementById('new-post-media').value = '';
            document.getElementById('new-post-media-preview').style.display = 'none';
            document.getElementById('new-post-media-preview').innerHTML = '';
        }

        function publishNewPost() {
            const content = document.getElementById('new-post-content').value.trim();
            const mediaFile = document.getElementById('new-post-media').files[0];
            
            // Validation
            if (!content && !mediaFile) {
                showStatus('Please add content or media to your post', 'error');
                return;
            }
            
            // Auto-detect post type
            let postType = 'text';
            if (content && mediaFile) {
                postType = 'mixed';
            } else if (mediaFile) {
                postType = mediaFile.type.startsWith('image/') ? 'photo' : 'video';
            }
            
            // Create new post
            const newPost = {
                id: Date.now(),
                content: content,
                type: postType,
                media: null,
                createdAt: new Date().toISOString(),
                likes: 0,
                comments: 0,
                shares: 0
            };
            
            // Handle media
            if (mediaFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    newPost.media = {
                        type: mediaFile.type.startsWith('image/') ? 'image' : 'video',
                        url: e.target.result,
                        name: mediaFile.name
                    };
                    
                    saveAndDisplayPost(newPost);
                };
                reader.readAsDataURL(mediaFile);
            } else {
                saveAndDisplayPost(newPost);
            }
        }

        function saveAndDisplayPost(post) {
            // Save to profile data
            if (!profileData.posts) {
                profileData.posts = [];
            }
            profileData.posts.unshift(post);
            localStorage.setItem('userProfile', JSON.stringify(profileData));
            
            // Update posts count
            document.getElementById('posts-count').textContent = profileData.posts.length;
            
            // Clear form
            document.getElementById('new-post-content').value = '';
            document.getElementById('new-post-media').value = '';
            document.getElementById('new-post-media-preview').style.display = 'none';
            document.getElementById('new-post-media-preview').innerHTML = '';
            
            // Show success message
            showStatus('Post published successfully!', 'success');
            
            // Switch to posts tab to show the new post
            setTimeout(() => {
                // Switch to posts tab
                document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                
                // Activate posts tab
                const postsTabBtn = Array.from(document.querySelectorAll('.tab-button')).find(btn => btn.textContent.includes('Posts'));
                const postsTabContent = document.getElementById('posts-tab');
                
                if (postsTabBtn) postsTabBtn.classList.add('active');
                if (postsTabContent) postsTabContent.classList.add('active');
                
                // Force reload posts
                loadPosts();
                
                // Debug: Check if posts are loaded
                setTimeout(() => {
                    const postsList = document.getElementById('posts-list');
                    console.log('Posts after publishing:', {
                        count: profileData.posts.length,
                        htmlLength: postsList?.innerHTML?.length || 0,
                        hasImages: postsList?.innerHTML?.includes('<img')
                    });
                }, 500);
            }, 1000);
        }

        
        function loadMorePosts() {
            // Implementation for loading more posts (pagination)
            showStatus('Loading more posts...', 'success');
            // For now, just hide the button
            document.getElementById('load-more-btn').style.display = 'none';
        }

        function displayPosts(posts) {
            const postsList = document.getElementById('posts-list');
            
            if (!posts || posts.length === 0) {
                postsList.innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: rgba(255,255,255,0.5);">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">📝</div>
                        <p>No posts found. Create your first post in the "Publish New Post" tab!</p>
                    </div>
                `;
                return;
            }
            
            let postsHtml = '';
            posts.forEach(post => {
                const typeClass = post.type || 'text';
                const typeName = {
                    'text': '📄 Text',
                    'photo': '📷 Photo', 
                    'video': '🎥 Video',
                    'mixed': '🎨 Mixed'
                }[typeClass] || '📄 Text';
                
                const date = new Date(post.createdAt).toLocaleDateString('fr-FR', {
                    day: 'numeric',
                    month: 'short',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                postsHtml += `
                    <div class="post-item">
                        <div class="post-header">
                            <span class="post-type ${typeClass}">${typeName}</span>
                            <span style="color: rgba(255,255,255,0.5); font-size: 0.8rem;">${date}</span>
                        </div>
                        
                        ${post.content ? `<div class="post-content">${post.content}</div>` : ''}
                        
                        ${post.media ? `
                            <div class="post-media">
                                ${post.media.type === 'image' 
                                    ? `<img src="${post.media.url}" alt="${post.media.name}">`
                                    : `<video src="${post.media.url}" controls></video>`
                                }
                            </div>
                        ` : ''}
                        
                        <div class="post-footer">
                            <div class="post-actions">
                                <button class="post-action">❤️ ${post.likes || 0}</button>
                                <button class="post-action">💬 ${post.comments || 0}</button>
                                <button class="post-action">🔄 ${post.shares || 0}</button>
                            </div>
                            <button class="post-action delete" onclick="deletePost(${post.id})">🗑️ Delete</button>
                        </div>
                    </div>
                `;
            });
            
            postsList.innerHTML = postsHtml;
            
            // Show/hide load more button
            const loadMoreBtn = document.getElementById('load-more-btn');
            loadMoreBtn.style.display = posts.length > 5 ? 'block' : 'none';
        }

        
        // Utility functions
        function showStatus(message, type = 'success') {
            const statusEl = document.getElementById('status-message');
            statusEl.textContent = message;
            statusEl.className = 'status-message status-' + type + ' show';
            
            setTimeout(() => {
                statusEl.classList.remove('show');
            }, 3000);
        }

            </script>
</body>
</html>
